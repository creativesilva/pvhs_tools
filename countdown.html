<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>Countdown Clock</title>

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --app-spacing: 18px; --radius: 34px;
      --white-gradient: linear-gradient(180deg, #ffffff 0%, #dceaea 100%);
      --red-gradient: linear-gradient(180deg, #ffb8b8 0%, #ff5b5b 58%, #b80000 100%);
      --green-gradient: linear-gradient(180deg, #d2ffcf 0%, #5bff61 58%, #00b806 100%);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #021414; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; color: var(--white); touch-action: none; user-select: none; }

    /* The Frame ensures the app stays centered with margins when resized on desktop */
    .frame { 
      width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; 
      padding: 10px;
    }

    /* Locked iPhone Bubble Shape */
    .app {
      width: 430px; height: 880px; max-width: 100%; max-height: 100%;
      aspect-ratio: 430 / 880; border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column; padding: 10px var(--app-spacing) var(--app-spacing) var(--app-spacing);
      isolation: isolate;
      container-type: inline-size;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }
    
    .content { 
      position: relative; z-index: 1; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; 
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* Header in one single line */
    .top-row {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; gap: 8px; height: 44px; flex-shrink: 0; margin-bottom: 6px;
    }

    .action-pill { 
      display: flex; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--panel-border); 
      border-radius: 12px; overflow: hidden; backdrop-filter: blur(4px);
    }
    .pill-btn { appearance: none; background: transparent; border: none; color: #fff; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 8px 12px; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
    .pill-divider { width: 1px; background: var(--panel-border); height: 100%; }

    .logo-clear { width: 42px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); flex-shrink: 0; }
    .page-title { flex: 1; font-size: 16px; font-weight: 900; color: #dff7f7; text-transform: uppercase; margin: 0; text-align: center; letter-spacing: 1px; }

    .card { width: 100%; border-radius: 28px; background: var(--panel); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); box-shadow: var(--soft-shadow); margin-bottom: 12px; }
    
    .period-card { padding: 18px 14px; display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
    .school-card { padding: 18px 14px; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }

    /* NEW WEATHER CARD STYLE */
    .weather-card { 
      padding: 14px 14px; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    }
    .weather-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin: 0; letter-spacing: 0.5px;}
    .weather-text { font-size: 18px; font-weight: 900; color: #ffffff; text-transform: uppercase; margin: 0; letter-spacing: 0.5px;}


    .block-label { font-size: clamp(20px, 6vw, 26px); line-height: 1; font-weight: 900; text-transform: uppercase; margin: 0; color: #00d1d1; text-align: center; }
    
    /* Dynamic scaling to prevent clipping */
    .timer { 
      font-size: 22cqw; 
      line-height: 0.9; font-weight: 900; letter-spacing: -3px; margin: 8px 0; text-shadow: 0 10px 26px rgba(0,0,0,0.30); 
    }
    .timer.normal { background: var(--white-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .timer.warning { background: var(--red-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .timer.rest { background: var(--green-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .subtext { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin: 0; text-wrap: balance; text-align: center; }
    .status-row { font-size: 11px; font-weight: 800; color: #d9f2f2; text-transform: uppercase; margin: 4px 0 0 0; opacity: 0.8; }

    .school-label { font-size: 14px; font-weight: 900; color: #ffffff; text-transform: uppercase; margin-bottom: 2px; }
    .school-number { font-size: 80px; line-height: 0.9; font-weight: 900; letter-spacing: -4px; background: var(--white-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 4px 0; }
    .detail-row { font-size: 11px; color: #d9f2f2; margin: 2px 0; font-weight: 800; text-transform: uppercase; text-align: center; }
    .detail-row strong { color: #ffffff; }

    .footer-note { margin-top: auto; padding: 20px 0 4px 0; font-size: 10px; color: #b5d4d4; text-transform: uppercase; font-weight: 800; text-align: center; flex-shrink: 0; }

    /* Phone Override: Only used if NOT in popout mode */
    @media (max-width: 430px) {
      body:not(.is-popout) .frame { align-items: flex-start; padding: 0; }
      body:not(.is-popout) .app { width: 100vw; height: 100dvh; max-height: none; border-radius: 0; border: none; }
      .popout-pill { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="top-row">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <h1 class="page-title">Countdown</h1>
          <div class="action-pill">
            <a id="homeLink" href="index.html" class="pill-btn nav-link">Home</a>
            <div id="popoutSection" style="display: none;">
              <div class="pill-divider"></div>
              <button id="popoutBtn" class="pill-btn" type="button">Pop Out</button>
            </div>
          </div>
        </div>

        <div class="card period-card">
          <div class="block-label" id="blockLabel">Loading</div>
          <div class="timer normal" id="timerText">--:--</div>
          <p class="subtext" id="subText">Syncing Calendar...</p>
          <p class="status-row" id="scheduleText">Schedule: --</p>
        </div>

        <div class="card school-card">
          <div class="school-label">School Days Left</div>
          <div class="school-number" id="daysLeft">--</div>
          <p class="detail-row"><strong id="todayLabel">Today:</strong> <span id="todayText">--</span></p>
          <p class="detail-row"><strong>Last Day:</strong> June 10, 2026</p>
        </div>

        <div class="card weather-card">
          <p class="weather-label">Santa Maria, CA</p>
          <p class="weather-text" id="weatherText">Loading...</p>
        </div>

        <div class="footer-note">CREATED BY: MR. SILVA</div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const isPopout = mode === 'popout';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

    const popoutSection = document.getElementById("popoutSection");
    const popoutBtn = document.getElementById("popoutBtn"); 
    const homeLink = document.getElementById("homeLink");
    const navLinks = document.querySelectorAll(".nav-link");

    if (isPopout) {
      document.body.classList.add('is-popout');
      if (popoutSection) popoutSection.remove();
      navLinks.forEach(link => {
        const url = new URL(link.href, window.location.origin);
        url.searchParams.set('mode', 'popout');
        link.href = url.toString();
      });
    } else if (!isMobile && !isStandalone) {
      if (popoutSection) popoutSection.style.display = 'flex';
    }

    const timeZone = "America/Los_Angeles";
    const schoolDays = ["2026-01-15","2026-01-16","2026-01-20","2026-01-21","2026-01-22","2026-01-23","2026-01-26","2026-01-27","2026-01-28","2026-01-29","2026-01-30","2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06","2026-02-10","2026-02-11","2026-02-12","2026-02-13","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-02-27","2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06","2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13","2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20","2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27","2026-03-30","2026-03-31","2026-04-01","2026-04-02","2026-04-13","2026-04-14","2026-04-15","2026-04-16","2026-04-17","2026-04-20","2026-04-21","2026-04-22","2026-04-23","2026-04-24","2026-04-27","2026-04-28","2026-04-29","2026-04-30","2026-05-01","2026-05-04","2026-05-05","2026-05-06","2026-05-07","2026-05-08","2026-05-11","2026-05-12","2026-05-13","2026-05-14","2026-05-15","2026-05-18","2026-05-19","2026-05-20","2026-05-21","2026-05-22","2026-05-26","2026-05-27","2026-05-28","2026-05-29","2026-06-01","2026-06-02","2026-06-03","2026-06-04","2026-06-05","2026-06-08","2026-06-09","2026-06-10"];
    const minimumDays = new Set(["2026-02-27", "2026-04-02", "2026-04-24"]);

    const schedules = {
      regular: [ {l:"1ST PERIOD", s:"08:30", e:"09:20"}, {l:"PASSING", s:"09:20", e:"09:30"}, {l:"2ND PERIOD", s:"09:30", e:"10:20"}, {l:"NUTRITION", s:"10:20", e:"10:35"}, {l:"3RD PERIOD", s:"10:35", e:"11:25"}, {l:"PASSING", s:"11:25", e:"11:35"}, {l:"4TH PERIOD", s:"11:35", e:"12:25"}, {l:"LUNCH", s:"12:25", e:"13:05"}, {l:"5TH PERIOD", s:"13:05", e:"13:55"}, {l:"PASSING", s:"13:55", e:"14:05"}, {l:"6TH PERIOD", s:"14:05", e:"14:55"}, {l:"PASSING", s:"14:55", e:"15:05"}, {l:"7TH PERIOD", s:"15:05", e:"15:55"} ],
      monday: [ {l:"1ST PERIOD", s:"08:30", e:"09:10"}, {l:"PASSING", s:"09:10", e:"09:20"}, {l:"2ND PERIOD", s:"09:20", e:"10:00"}, {l:"NUTRITION", s:"10:00", e:"10:15"}, {l:"3RD PERIOD", s:"10:15", e:"10:55"}, {l:"PASSING", s:"10:55", e:"11:05"}, {l:"4TH PERIOD", s:"11:05", e:"11:45"}, {l:"LUNCH", s:"11:45", e:"12:25"}, {l:"5TH PERIOD", s:"12:25", e:"13:05"}, {l:"PASSING", s:"13:05", e:"13:15"}, {l:"6TH PERIOD", s:"13:15", e:"13:55"}, {l:"PASSING", s:"13:55", e:"14:05"}, {l:"7TH PERIOD", s:"14:05", e:"14:45"} ],
      minimum: [ {l:"1ST PERIOD", s:"08:30", e:"09:00"}, {l:"PASSING", s:"09:00", e:"09:10"}, {l:"2ND PERIOD", s:"09:10", e:"09:40"}, {l:"NUTRITION", s:"09:40", e:"09:55"}, {l:"3RD PERIOD", s:"09:55", e:"10:25"}, {l:"PASSING", s:"10:25", e:"10:35"}, {l:"4TH PERIOD", s:"10:35", e:"11:05"}, {l:"LUNCH", s:"11:05", e:"11:45"}, {l:"5TH PERIOD", s:"11:45", e:"12:15"}, {l:"PASSING", s:"12:15", e:"12:25"}, {l:"6TH PERIOD", s:"12:25", e:"12:55"}, {l:"PASSING", s:"12:55", e:"13:05"}, {l:"7TH PERIOD", s:"13:05", e:"13:35"} ]
    };

    function getNow() {
      const now = new Date();
      const dateStr = new Intl.DateTimeFormat("en-CA", {timeZone, year:"numeric", month:"2-digit", day:"2-digit"}).format(now);
      const weekday = new Intl.DateTimeFormat("en-US", {timeZone, weekday:"long"}).format(now);
      const longDate = new Intl.DateTimeFormat("en-US", {timeZone, weekday:"long", month:"long", day:"numeric", year:"numeric"}).format(now);
      const parts = new Intl.DateTimeFormat("en-US", {timeZone, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false}).formatToParts(now);
      const h = Number(parts.find(p=>p.type==='hour').value), m = Number(parts.find(p=>p.type==='minute').value), s = Number(parts.find(p=>p.type==='second').value);
      return { dateStr, weekday, longDate, totalSec: (h*3600)+(m*60)+s };
    }

    function formatTime(sec, forceHH = false) {
      const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
      if (h > 0 || forceHH) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateApp() {
      const now = getNow();
      document.getElementById("daysLeft").textContent = schoolDays.filter(d => d >= now.dateStr).length;
      document.getElementById("todayText").textContent = now.longDate;

      let schedType = "REGULAR DAY", blocks = schedules.regular;
      if (minimumDays.has(now.dateStr)) { schedType = "MINIMUM DAY"; blocks = schedules.minimum; }
      else if (now.weekday === "Monday") { schedType = "COLLABORATION MONDAY"; blocks = schedules.monday; }
      document.getElementById("scheduleText").textContent = `Schedule: ${schedType}`;

      const isSchoolDay = schoolDays.includes(now.dateStr);
      const firstStart = (8*3600)+(30*60);
      const lastEnd = parseToSec(blocks[blocks.length-1].e);

      if (isSchoolDay && now.totalSec >= firstStart && now.totalSec < lastEnd) {
        for (let i=0; i<blocks.length; i++) {
          const s = parseToSec(blocks[i].s), e = parseToSec(blocks[i].e);
          if (now.totalSec >= s && now.totalSec < e) {
            const rem = e - now.totalSec;
            document.getElementById("blockLabel").textContent = blocks[i].l;
            document.getElementById("timerText").textContent = formatTime(rem);
            document.getElementById("timerText").className = rem <= 300 ? "timer warning" : "timer normal";
            document.getElementById("subText").textContent = i < blocks.length-1 ? `Next: ${blocks[i+1].l}` : "Almost done for today!";
            return;
          }
        }
      }

      const nextDay = schoolDays.find(d => d > now.dateStr) || schoolDays[0];
      const nextDate = new Date(nextDay + "T08:30:00");
      const diff = Math.floor((nextDate - new Date()) / 1000);

      document.getElementById("blockLabel").textContent = now.weekday === "Friday" || now.weekday === "Saturday" ? "Weekend Recharge" : "Rest Time Remaining";
      document.getElementById("timerText").textContent = formatTime(diff, true);
      document.getElementById("timerText").className = "timer rest";
      document.getElementById("subText").textContent = !isSchoolDay ? "Enjoy your time off!" : "School's out, get some rest!";
    }

    function parseToSec(t) { const [h,m] = t.split(":").map(Number); return (h*3600)+(m*60); }
    setInterval(updateApp, 1000); updateApp();

    // LIVE WEATHER FETCH SCRIPT
    async function fetchWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.9530&longitude=-120.4357&current_weather=true&temperature_unit=fahrenheit');
        const data = await res.json();
        const temp = Math.round(data.current_weather.temperature);
        const code = data.current_weather.weathercode;
        
        let desc = "☁️ Weather";
        if (code === 0) desc = "☀️ Clear";
        else if (code === 1) desc = "🌤️ Mostly Clear";
        else if (code === 2) desc = "⛅ Partly Cloudy";
        else if (code === 3) desc = "☁️ Overcast";
        else if (code === 45 || code === 48) desc = "🌫️ Fog";
        else if (code >= 51 && code <= 55) desc = "🌧️ Drizzle";
        else if (code >= 61 && code <= 65) desc = "🌧️ Rain";
        else if (code >= 71 && code <= 77) desc = "❄️ Snow";
        else if (code >= 80 && code <= 82) desc = "🌧️ Showers";
        else if (code >= 95) desc = "⛈️ Thunderstorm";

        document.getElementById('weatherText').textContent = `${desc} | ${temp}°F`;
      } catch (err) {
        document.getElementById('weatherText').textContent = "Weather Unavailable";
      }
    }
    
    // Call immediately, then refresh every 15 mins (900000 ms)
    fetchWeather(); 
    setInterval(fetchWeather, 900000);

    if (popoutBtn) {
      popoutBtn.addEventListener("click", () => {
        window.open('countdown.html?mode=popout', 'pvPop', 'width=450,height=900,resizable=yes,scrollbars=no');
      });
    }
  </script>
</body>
</html>
