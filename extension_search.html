<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Search">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>PVHS Extension Search</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --app-spacing: 16px; /* Symmetrical margin variable */
      --radius: 34px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #021414; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--white); }

    .frame {
      width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
    }

    .app {
      width: min(100%, 414px); 
      height: min(100%, 850px);
      aspect-ratio: 9 / 19.5;
      border-radius: var(--radius); 
      overflow: hidden; 
      position: relative; 
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column;
      padding: 20px var(--app-spacing) var(--app-spacing) var(--app-spacing);
    }

    .ghost-logo {
      position: absolute; top: 50%; left: 50%; width: 180%; opacity: 0.06;
      filter: grayscale(100%); pointer-events: none; z-index: 0; transform: translate(-50%, -50%);
    }

    .content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 12px; }
    .top-actions { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 4px; }
    
    .popout-btn {
      appearance: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 8px 10px; background: rgba(255,255,255,0.08); color: #fff;
      font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer;
    }

    .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .logo-clear { width: 48px; height: auto; }
    .page-title { flex: 1; font-size: 16px; font-weight: 900; color: #dff7f7; text-transform: uppercase; margin: 0; text-align: center;}
    
    .home-link {
      padding: 8px 12px; border-radius: 14px; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12); color: #fff; text-decoration: none;
      font-size: 10px; font-weight: 900; text-transform: uppercase;
    }

    .search-card, .results-card {
      width: 100%; border-radius: 24px; background: var(--panel); border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .search-card { padding: 18px 14px; flex-shrink: 0; }
    .results-card { padding: 14px 14px 0 14px; text-align: left; flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .search-title { margin: 0 0 2px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
    .helper-text { margin: 0 0 14px 0; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

    .search-input {
      width: 100%; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
      padding: 14px; font-size: 16px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.2); outline: none;
    }

    .result-count { margin-bottom: 10px; font-size: 10px; font-weight: 900; color: #dff7f7; text-transform: uppercase; text-align: center; opacity: 0.8;}
    
    .results-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    
    .result-item { border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); padding: 14px; }
    .result-name { margin: 0 0 2px 0; font-size: 15px; font-weight: 900; color: #fff; text-transform: uppercase; }
    .result-line { margin: 0; font-size: 10px; font-weight: 700; color: #d8f1f1; text-transform: uppercase; opacity: 0.7; }
    .result-ext { margin-top: 8px; font-size: 14px; font-weight: 900; color: #fff; }

    .footer-note { margin-top: auto; padding: 10px 0 4px 0; font-size: 8px; color: #b5d4d4; text-transform: uppercase; font-weight: 800; opacity: 0.6; text-align: center; letter-spacing: 1px; }

    @media (max-width: 450px) {
      .app { border-radius: 0; border: none; width: 100%; height: 100dvh; aspect-ratio: auto; }
      .frame { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="top-actions">
          <button id="popoutBtn" class="popout-btn" type="button">Pop Out</button>
        </div>
        <div class="topbar">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <h1 class="page-title">PVHS Search</h1>
          <a class="home-link" href="index.html">Home</a>
        </div>
        <div class="search-card">
          <h2 class="search-title">Directory</h2>
          <p class="helper-text">Search by Name, Department, or Extension</p>
          <input id="searchInput" class="search-input" type="text" placeholder="Silva, Math, 5105..." autocomplete="off">
        </div>
        <div class="results-card">
          <p class="result-count" id="resultCount">Recommended Contacts</p>
          <div class="results-list" id="resultsList"></div>
        </div>
        <div class="footer-note">PVHS Staff Directory 2025-2026</div>
      </div>
    </div>
  </div>

  <script>
    const extensionSearch = [
      { name: "PVHS Emergency Line", role: "Emergency", extension: "5000", keywords: ["emergency", "urgent"] },
      { name: "Julie Norris", role: "Maintenance Secretary", extension: "5275", department: "Maintenance" },
      { name: "Chris Silva", role: "Visual and Performing Arts / Teacher", extension: "5322", room: "322", keywords: ["photography", "art"] },
      { name: "Laura Garcia Solorio", role: "Visual and Performing Arts / Teacher", extension: "5322", room: "322" },
      { name: "Araceli Mandujano", role: "Administrative Assistant", extension: "5702", department: "Administration" },
      { name: "Kevin Ilac", role: "Assistant Principal", extension: "5703", department: "Administration" },
      { name: "Merrie Okie-Goldin", role: "Assistant Principal", extension: "5707", department: "Administration" },
      { name: "Jeff Hromadka", role: "Assistant Principal", extension: "5709", department: "Administration" },
      { name: "Christian Basulto", role: "Dean", extension: "5122", department: "Administration" },
      { name: "Chris Carrillo", role: "Counselor / Department Chair", extension: "5198", department: "Guidance" },
      { name: "Susan Avrit", role: "Counselor", extension: "5775", department: "Guidance" },
      { name: "Heydi Elenes", role: "Counselor", extension: "5768", department: "Guidance" },
      { name: "Sandra Gonzalez", role: "Counselor", extension: "5765", department: "Guidance" },
      { name: "Nadia Mancha", role: "Counselor", extension: "5767", department: "Guidance" },
      { name: "Rocio Trujillo", role: "Counselor", extension: "5763", department: "Guidance" },
      { name: "Brooke Baarstad", role: "Mathematics / Department Chair", extension: "5209", department: "Mathematics" },
      { name: "Sharon Domingues", role: "Mathematics / Site Council", extension: "5456", department: "Mathematics" },
      { name: "Hector Guerra", role: "Agriculture / Department Chair", extension: "5207", department: "Agriculture" },
      { name: "Gabriel Ponce", role: "Agriculture / Department Chair", extension: "5208", department: "Agriculture" },
      { name: "Selyn Harwin", role: "Visual and Performing Arts / Department Chair", extension: "5202", department: "Visual and Performing Arts", room: "Drama" },
      { name: "Christine Linne", role: "Industrial Technology / Department Chair", extension: "5204", department: "Industrial Technology" },
      { name: "Scott Wonnell", role: "Industrial Technology / Department Chair", extension: "5205", department: "Industrial Technology" },
      { name: "Riccardo Magni", role: "Science / Department Chair", extension: "5411", department: "Science" },
      { name: "Brett Dodson", role: "Social Science / Department Chair", extension: "5634", department: "Social Science" },
      { name: "Eric Jeffres", role: "Special Education / Department Chair", extension: "5363", department: "Special Education" },
      { name: "John Ruiz", role: "Special Education / Department Chair", extension: "5629", department: "Special Education" },
      { name: "Jesse Zambrano", role: "International Languages / Department Chair", extension: "5213", department: "International Languages" },
      { name: "Annette MacCuish", role: "English / Department Chair", extension: "5365", department: "English" },
      { name: "Jim Doyle", role: "Physical Education / Department Chair", extension: "5514", department: "Physical Education" },
      { name: "Lisa Walters", role: "Activities Director", extension: "5508", department: "ASB" },
      { name: "Eddie Hernandez", role: "Security", extension: "5773" },
      { name: "Karine Perez", role: "Administrative Assistant", extension: "5123", department: "Administration" },
      { name: "Attendance Office", role: "Office", extension: "5105 / 5107" },
      { name: "Health Office", role: "Nurse", extension: "5760" },
      { name: "Library", role: "Librarian", extension: "5101" },
      { name: "Wellness Center", role: "Support", extension: "5310" },
      { name: "Elias Camacho", role: "Maintenance Lead", extension: "5276" },
      { name: "Tyson Ellis", role: "Plant Manager", extension: "5276" },
      { name: "Ben Alberry", role: "Special Education Coordinator", extension: "5758" },
      { name: "Juan Antonio-Martinez", role: "EAOP Counselor", extension: "5692" },
      { name: "Rudy Binkele", role: "Teacher", extension: "5352", department: "English" },
      { name: "Britta Bonaventure", role: "Teacher", extension: "5353", department: "English" },
      { name: "Alan Brafman", role: "Teacher", extension: "5217", department: "International Languages" },
      { name: "Bilena Brafman", role: "Teacher", extension: "5302", department: "English" },
      { name: "Dustin Cornejo", role: "Teacher", extension: "5632", department: "Social Science" },
      { name: "Tyler Dickinson", role: "Teacher", extension: "5311", department: "Agriculture" },
      { name: "Stephanie Fikri", role: "Teacher", extension: "5312", department: "Visual and Performing Arts" },
      { name: "Michele Lyon", role: "Teacher", extension: "5606", department: "Special Education" },
      { name: "Teri Wisz (formerly Magni)", role: "Teacher", extension: "5301", department: "English" },
      { name: "Tech Help Desk", role: "Information Technology Support", extension: "4612" }
    ];

    const defaultSuggestions = ["PVHS Emergency Line", "Julie Norris", "Eddie Hernandez", "Karine Perez"];

    function getLevenshteinDistance(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
      for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
      }
      return matrix[a.length][b.length];
    }

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("resultsList");
    const resultCount = document.getElementById("resultCount");

    function renderResults(query) {
      const q = query.toLowerCase().trim();
      let results = [];

      if (!q) {
        results = extensionSearch.filter(e => defaultSuggestions.includes(e.name));
        resultCount.textContent = "Recommended Contacts";
      } else {
        results = extensionSearch.filter(e => {
          const searchSpace = [e.name, e.role, e.department, e.extension, e.room, ...(e.keywords || [])].join(" ").toLowerCase();
          return searchSpace.includes(q);
        });

        if (results.length === 0 && q.length > 2) {
          results = extensionSearch
            .map(e => ({ ...e, dist: getLevenshteinDistance(q, e.name.toLowerCase().split(' ').pop()) }))
            .filter(e => e.dist <= 2)
            .sort((a, b) => a.dist - b.dist);
        }
        resultCount.textContent = results.length > 0 ? `${results.length} found` : "No results found";
      }

      resultsList.innerHTML = results.length ? "" : '<p style="text-align:center; padding:20px; opacity:0.6; font-size:12px;">NO MATCHES FOUND</p>';

      results.forEach(entry => {
        // Automatically check if it's an extension or full phone number
        const isPhoneNumber = entry.extension.replace(/[^0-9]/g, "").length > 4;
        const label = isPhoneNumber ? "Phone" : "Ext";

        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <p class="result-name">${entry.name}</p>
          <p class="result-line">${entry.role}${entry.department ? ' • ' + entry.department : ''}</p>
          ${entry.room ? `<p class="result-line">Room: ${entry.room}</p>` : ''}
          <p class="result-ext">${label}: ${entry.extension}</p>
        `;
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    renderResults("");
    
    document.getElementById("popoutBtn")?.addEventListener("click", () => {
      window.open(window.location.href, 'popout', 'width=430,height=880');
    });
  </script>
</body>
</html>
