<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Search">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>Extension Search</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --app-spacing: 16px;
      --radius: 34px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #021414; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--white); }

    .frame {
      width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center;
      background: #021414; padding: 10px;
    }

    .app {
      width: min(100%, 414px); height: min(100%, 850px);
      aspect-ratio: 9 / 19.5; border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column;
      padding: 20px var(--app-spacing) var(--app-spacing) var(--app-spacing);
    }

    .ghost-logo {
      position: absolute; top: 50%; left: 50%; width: 180%; opacity: 0.06;
      filter: grayscale(100%); pointer-events: none; z-index: 0; transform: translate(-50%, -50%);
    }

    .content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 12px; }
    
    .action-pill {
      display: flex; align-self: flex-end; background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--panel-border); border-radius: 14px; overflow: hidden;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); margin-bottom: 8px;
    }

    .pill-btn {
      appearance: none; background: transparent; border: none; color: #fff;
      font-size: 10px; font-weight: 900; text-transform: uppercase;
      padding: 10px 14px; cursor: pointer; text-decoration: none; display: flex; align-items: center;
    }

    .pill-divider { width: 1px; background: var(--panel-border); height: 100%; }

    .topbar { width: 100%; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 4px; }
    .logo-clear { width: 44px; height: auto; position: absolute; left: 0; }
    .page-title { font-size: 16px; font-weight: 900; color: #dff7f7; text-transform: uppercase; margin: 0; letter-spacing: 1px;}

    .search-card, .results-card {
      width: 100%; border-radius: 24px; background: var(--panel); border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .search-card { padding: 18px 14px; flex-shrink: 0; }
    .results-card { padding: 14px 14px 0 14px; text-align: left; flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .search-title { margin: 0 0 2px 0; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
    .helper-text { margin: 0 0 14px 0; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

    .search-input {
      width: 100%; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
      padding: 14px; font-size: 16px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.2); outline: none;
    }

    .result-count { margin-bottom: 10px; font-size: 10px; font-weight: 900; color: #dff7f7; text-transform: uppercase; text-align: center; opacity: 0.8;}
    .results-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .result-item { border-radius: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); padding: 14px; }
    .result-name { margin: 0 0 2px 0; font-size: 15px; font-weight: 900; color: #fff; text-transform: uppercase; }
    .result-line { margin: 0; font-size: 10px; font-weight: 700; color: #d8f1f1; text-transform: uppercase; opacity: 0.7; }
    .result-ext { margin-top: 8px; font-size: 14px; font-weight: 900; color: #fff; }

    .footer-note { margin-top: auto; padding: 10px 0 4px 0; font-size: 8px; color: #b5d4d4; text-transform: uppercase; font-weight: 800; opacity: 0.6; text-align: center; letter-spacing: 1px; }

    @media (max-width: 380px) { .app { border-radius: 0; border: none; width: 100%; height: 100dvh; aspect-ratio: auto; } .frame { padding: 0; } }
  </style>
</head>

        </div>

    const defaultSuggestions = ["PVHS Emergency Line", "Julie Norris", "Eddie Hernandez", "Karine Perez"];

    function checkPopout() {
      if (window.name === 'popout' || window.location.search.includes('popout=true')) {
        document.getElementById('popoutSection').style.display = 'none';
      }
    }

    function getLevenshteinDistance(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
      for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
      }
      return matrix[a.length][b.length];
    }

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("resultsList");
    const resultCount = document.getElementById("resultCount");

    function renderResults(query) {
      const q = query.toLowerCase().trim();
      let results = [];

      if (!q) {
        results = extensionSearch.filter(e => defaultSuggestions.includes(e.name));
        resultCount.textContent = "Recommended Contacts";
      } else {
        results = extensionSearch.filter(e => {
          const searchSpace = [e.name, e.role, (e.department || ""), e.extension, (e.room || "")].join(" ").toLowerCase();
          return searchSpace.includes(q);
        });

        if (results.length === 0 && q.length > 2) {
          results = extensionSearch
            .map(e => ({ ...e, dist: getLevenshteinDistance(q, e.name.toLowerCase().split(' ').pop()) }))
            .filter(e => e.dist <= 2)
            .sort((a, b) => a.dist - b.dist);
        }
        resultCount.textContent = results.length > 0 ? `${results.length} found` : "No results found";
      }

      resultsList.innerHTML = results.length ? "" : '<p style="text-align:center; padding:20px; opacity:0.6; font-size:12px;">NO MATCHES FOUND</p>';

      results.forEach(entry => {
        const isPhoneNumber = entry.extension.replace(/[^0-9]/g, "").length > 4;
        const label = isPhoneNumber ? "Phone" : "Ext";
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <p class="result-name">${entry.name}</p>
          <p class="result-line">${entry.role}${entry.department ? ' • ' + entry.department : ''}</p>
          ${entry.room ? `<p class="result-line">Room: ${entry.room}</p>` : ''}
          <p class="result-ext">${label}: ${entry.extension}</p>
        `;
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    document.getElementById("popoutBtn")?.addEventListener("click", () => {
      window.open(window.location.href + '?popout=true', 'popout', 'width=430,height=880');
    });

    checkPopout();
    renderResults("");
