<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="PV_AppIcon.png">
  <link rel="icon" type="image/png" sizes="1024x1024" href="PV_AppIcon.png">
  <title>Directory Search</title>

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12); --app-spacing: 16px; --radius: 34px;
      --standalone-app-width: 100vw; --standalone-app-height: 100dvh;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    html, body { width: 100%; height: 100%; min-height: 100%; background: #021414; overflow: hidden; }
    body { min-height: 100vh; min-height: 100dvh; min-height: -webkit-fill-available; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; color: var(--white); touch-action: none; user-select: none; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    /* The Frame ensures the app stays centered with margins on Desktop */
    .frame { 
      width: 100%; height: 100dvh; min-height: 100vh; min-height: -webkit-fill-available; display: flex; align-items: center; justify-content: center; 
      padding: 10px;
    }

    /* THE PERMANENT IPHONE BUBBLE */
    .app {
      width: 430px; 
      height: 880px; 
      max-width: 100%; 
      max-height: 100%;
      border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column; padding: 10px var(--app-spacing) var(--app-spacing) var(--app-spacing);
      isolation: isolate;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }
    
    .content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }

    /* ONE-LINE HEADER */
    .top-row {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; gap: 10px; height: 42px; flex-shrink: 0; margin-bottom: 6px;
    }

    /* ── NAV DROPDOWN MENU ─────────────────────────────── */
    .nav-menu-btn {
      appearance: none; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13); border-radius: 12px;
      color: rgba(255,255,255,0.92); width: 34px; height: 34px;
      font-size: 14px; font-weight: 900; letter-spacing: 0.08em;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.16s, border-color 0.16s;
    }
    .nav-menu-btn.is-open,
    .nav-menu-btn:active { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.26); }
    .nav-menu {
      position: fixed; z-index: 9999; min-width: 172px;
      background: rgba(3, 20, 20, 0.97);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px; padding: 5px;
      box-shadow: 0 14px 44px rgba(0,0,0,0.52);
      backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px);
      transform-origin: top right;
      transform: scale(0.88) translateY(-8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.17s ease, transform 0.19s cubic-bezier(0.34,1.4,0.64,1);
    }
    .nav-menu.is-open { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .nav-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 11px;
      text-decoration: none; color: #eaf8f8; background: transparent;
      font-size: 11.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; border: none; cursor: pointer; width: 100%;
      transition: background 0.13s;
    }
    .nav-menu-item:active { background: rgba(255,255,255,0.1); }
    .nav-menu-icon { font-size: 14px; flex-shrink: 0; }
    .nav-menu-sep { height: 1px; background: rgba(255,255,255,0.09); margin: 3px 6px; }

    .logo-clear { width: 42px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); flex-shrink: 0; }
    .page-title { flex: 1; font-size: 15px; font-weight: 700; color: #dff7f7; text-transform: uppercase; margin: 0; text-align: left; letter-spacing: 0.14em; }

    .search-card { padding: 12px 14px 14px; border-radius: 24px; background: var(--panel); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); flex-shrink: 0; box-shadow: var(--soft-shadow); }
    .search-title { margin: 0 0 2px 0; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
    .helper-text { margin: 0 0 10px 0; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; text-align: center; letter-spacing: 0.08em; }
    .search-input { width: 100%; border: 1px solid rgba(255,255,255,0.16); border-radius: 16px; padding: 11px 14px; font-size: 15px; font-weight: 500; color: #fff; background: rgba(0,0,0,0.18); outline: none; text-align: center; }

    .results-card { 
      padding: 12px 12px 0 12px; border-radius: 24px; background: var(--panel); border: 1px solid var(--panel-border); 
      backdrop-filter: blur(10px); box-shadow: var(--soft-shadow);
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }
    .result-count { margin-bottom: 8px; font-size: 10px; font-weight: 600; color: #dff7f7; text-transform: uppercase; text-align: center; opacity: 0.8; flex-shrink: 0; letter-spacing: 0.08em;}
    
    .results-list { 
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .result-item { border-radius: 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); padding: 10px 12px; flex-shrink: 0; }
    .result-name { margin: 0 0 3px 0; font-size: 15px; font-weight: 700; color: #fff; text-transform: none; text-align: center; }
    .result-line { margin: 0; font-size: 10px; font-weight: 600; color: #d8f1f1; text-transform: none; opacity: 0.82; text-align: center; }
    .result-ext { margin-top: 6px; font-size: 14px; font-weight: 700; color: #fff; text-align: center; }

    .footer-note { margin-top: auto; padding: 10px 0 3px 0; font-size: 9.5px; color: #b5d4d4; font-weight: 600; text-align: center; flex-shrink: 0; }

    body.is-standalone { background: #021414; }

    body.is-standalone::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #021414;
      pointer-events: none;
      z-index: 0;
    }

    body.is-standalone .frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      padding: 0 8px max(24px, calc(env(safe-area-inset-bottom) + 8px)) 8px;
      z-index: 1;
    }

    body.is-standalone .app {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 46px rgba(0,0,0,0.22);
      padding-top: max(10px, env(safe-area-inset-top));
      padding-right: max(var(--app-spacing), env(safe-area-inset-right));
      padding-bottom: 18px;
      padding-left: max(var(--app-spacing), env(safe-area-inset-left));
    }

    /* NATIVE APP OVERRIDE (Option B) */
    @media (max-width: 430px) {
      body:not(.is-popout):not(.is-standalone) .frame {
        padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
      }
      body:not(.is-popout):not(.is-standalone) .app {
        width: 100vw;
        height: 100%;
        max-height: 100%;
        border-radius: var(--radius);
        border: 1px solid rgba(255,255,255,0.12);
      }
      /* nav menu always visible */
      body { touch-action: pan-y; }
    }

    /* ── ADD TO HOME SCREEN PROMPT ─────────────────────── */
    .a2hs-prompt {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 0 14px 16px;
      transform: translateY(110%);
      transition: transform 0.48s cubic-bezier(0.34, 1.36, 0.64, 1);
      pointer-events: none;
    }
    .a2hs-prompt.is-visible { transform: translateY(0); pointer-events: auto; }
    .a2hs-inner {
      display: flex; align-items: center; gap: 11px;
      background: rgba(2, 22, 22, 0.93);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px; padding: 12px 14px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 -6px 28px rgba(0,0,0,0.34);
    }
    .a2hs-icon { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; }
    .a2hs-text { flex: 1; }
    .a2hs-title { font-size: 11.5px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.11em; margin: 0 0 3px; }
    .a2hs-desc  { font-size: 10px; font-weight: 500; color: var(--muted); line-height: 1.45; margin: 0; }
    .a2hs-share {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(0,130,255,0.85); color: #fff;
      border-radius: 5px; padding: 1px 4px; font-size: 10px; font-weight: 700;
      vertical-align: middle; margin: 0 1px;
    }
    .a2hs-dismiss {
      appearance: none; background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
      border-radius: 99px; width: 26px; height: 26px; font-size: 12px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .a2hs-dismiss:active { background: rgba(255,255,255,0.18); }
  </style>

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const isPopout = mode === 'popout';

    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

    const navLinks = document.querySelectorAll(".nav-link");

    function updateStandaloneViewportVars() {
      if (!isStandalone) return;
      const heightCandidates = [
        window.innerHeight,
        window.outerHeight,
        window.visualViewport ? Math.round(window.visualViewport.height) : 0,
        window.screen ? window.screen.height : 0,
        window.screen ? window.screen.availHeight : 0
      ].filter(Boolean);
      const widthCandidates = [
        window.innerWidth,
        window.outerWidth,
        window.visualViewport ? Math.round(window.visualViewport.width) : 0,
        window.screen ? window.screen.width : 0,
        window.screen ? window.screen.availWidth : 0
      ].filter(Boolean);

      const appHeight = Math.max(...heightCandidates);
      const appWidth = Math.max(...widthCandidates);

      document.documentElement.style.setProperty('--standalone-app-height', `${appHeight}px`);
      document.documentElement.style.setProperty('--standalone-app-width', `${appWidth}px`);
    }

    if (isStandalone) {
      document.body.classList.add('is-standalone');
      updateStandaloneViewportVars();
      window.addEventListener('resize', updateStandaloneViewportVars);
      window.addEventListener('orientationchange', updateStandaloneViewportVars);
      window.addEventListener('pageshow', updateStandaloneViewportVars);
      window.visualViewport?.addEventListener('resize', updateStandaloneViewportVars);
      setTimeout(updateStandaloneViewportVars, 250);
      setTimeout(updateStandaloneViewportVars, 800);
    }

    // PERSISTENT UI LOGIC
    if (isPopout) {
      document.body.classList.add('is-popout');
      navLinks.forEach(link => {
        const url = new URL(link.href, window.location.origin);
        url.searchParams.set('mode', 'popout');
        link.href = url.toString();
      });
    }

    // NAV MENU
    const navMenuBtn = document.getElementById('navMenuBtn');
    const navMenu    = document.getElementById('navMenu');
    function positionNavMenu() {
      if (!navMenuBtn || !navMenu) return;
      const r = navMenuBtn.getBoundingClientRect();
      navMenu.style.top   = `${r.bottom + 6}px`;
      navMenu.style.right = `${window.innerWidth - r.right}px`;
    }
    navMenuBtn?.addEventListener('click', e => {
      e.stopPropagation();
      positionNavMenu();
      const open = navMenu.classList.toggle('is-open');
      navMenuBtn.classList.toggle('is-open', open);
      navMenuBtn.setAttribute('aria-expanded', String(open));
    });

      navMenu?.classList.remove('is-open');

          if (nextHref) window.location.assign(nextHref);
        });
      });

    const defaultSuggestions = ["PVHS Emergency Line", "Julie Norris", "Eddie Hernandez", "Karine Perez"];

    function getLevenshteinDistance(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
      for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
      }
      return matrix[a.length][b.length];
    }

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("resultsList");
    const resultCount = document.getElementById("resultCount");

    function renderResults(query) {
      const q = query.toLowerCase().trim();
      let results = [];

      if (!q) {
        results = extensionSearch.filter(e => defaultSuggestions.includes(e.name));
        resultCount.textContent = "Recommended Contacts";
      } else {
        results = extensionSearch.filter(e => {
          const searchSpace = [e.name, (e.role || ""), (e.extension || ""), (e.room || "")].join(" ").toLowerCase();
          return searchSpace.includes(q);
        });

        if (results.length === 0 && q.length >= 3) {
           results = extensionSearch
            .map(e => ({ ...e, dist: getLevenshteinDistance(q, e.name.toLowerCase().split(' ').pop().substring(0, q.length)) }))
            .filter(e => e.dist <= 1)
            .sort((a, b) => a.dist - b.dist);
        }
        resultCount.textContent = results.length > 0 ? `${results.length} found` : "No results found";
      }

      resultsList.innerHTML = results.length ? "" : '<p style="text-align:center; padding:20px; opacity:0.6; font-size:12px;">NO MATCHES FOUND</p>';

      results.forEach(entry => {
        const isPhoneNumber = entry.extension.replace(/[^0-9]/g, "").length > 4;
        const label = isPhoneNumber ? "Phone" : "Ext";
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `<p class="result-name">${entry.name}</p><p class="result-line">${entry.role}</p>${entry.room ? `<p class="result-line">Room: ${entry.room}</p>` : ''}<p class="result-ext">${label}: ${entry.extension}</p>`;
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    renderResults("");

    // ── A2HS / INSTALL PROMPT ───────────────────────────────────
    const a2hsPrompt  = document.getElementById('a2hsPrompt');
    const a2hsDismiss = document.getElementById('a2hsDismiss');
    const a2hsDesc    = document.getElementById('a2hsDesc');
    const isIOS       = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid   = /Android/i.test(navigator.userAgent);
    const a2hsSeen    = localStorage.getItem('pvhs_a2hs_seen');

    if (isMobile && !isStandalone && !false && !a2hsSeen && a2hsPrompt) {
      if (isAndroid && a2hsDesc) {
        a2hsDesc.innerHTML = 'Tap <strong style="color:#fff">⋮ Menu</strong> in your browser then <strong style="color:#fff">"Add to Home Screen"</strong> for the full app experience.';
      }
      a2hsPrompt.hidden = false;
      setTimeout(() => a2hsPrompt.classList.add('is-visible'), 1800);
      a2hsDismiss?.addEventListener('click', () => {
        a2hsPrompt.classList.remove('is-visible');
        localStorage.setItem('pvhs_a2hs_seen', '1');
        setTimeout(() => { a2hsPrompt.hidden = true; }, 500);
      });
    }

    // Install nav button
    (function() {
      const btn = document.getElementById('installBtn');
      const sep = document.getElementById('installMenuSep');
      if (!btn) return;
      if (isStandalone || false) { btn.remove(); sep?.remove(); return; }
      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
      });
      btn.addEventListener('click', () => {
        navMenu?.classList.remove('is-open');
        navMenuBtn?.classList.remove('is-open');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        } else if (a2hsPrompt) {
          a2hsPrompt.hidden = false;
          setTimeout(() => a2hsPrompt.classList.add('is-visible'), 10);
        }
      });
    })();
