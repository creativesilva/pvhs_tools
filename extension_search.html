<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png?v=23">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png?v=23">
  <link rel="icon" type="image/png" sizes="512x512" href="PV_Logo.png?v=23">
  <link rel="shortcut icon" href="PV_Logo.png?v=23">
  <title>PVHS Tools</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #021414;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      touch-action: pan-y;
    }

    .frame {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(12px, env(safe-area-inset-top))
        12px
        max(12px, env(safe-area-inset-bottom))
        12px;
    }

    .app {
      width: min(100%, 430px);
      aspect-ratio: 430 / 880;
      max-height: calc(100dvh - 24px);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex;
      justify-content: center;
      padding: 18px 18px 16px 18px;
      text-align: center;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
        radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo {
      position: absolute;
      top: 56%;
      left: 50%;
      width: 182%;
      max-width: none;
      transform: translate(-50%, -50%);
      opacity: 0.07;
      filter: grayscale(100%) contrast(108%) brightness(114%);
      pointer-events: none;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 100%;
    }

    .top-actions {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 34px;
      margin-bottom: 2px;
    }

    .popout-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 9px 11px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .popout-btn:active {
      transform: scale(0.985);
    }

    .header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo-clear {
      width: 86px;
      max-width: 86px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24));
    }

    .title {
      margin: 0;
      font-size: clamp(34px, 10vw, 56px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0;
      max-width: 290px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--muted);
      text-wrap: balance;
    }

    .launcher-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 2px;
    }

    .launch-card {
      width: 100%;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      text-decoration: none;
      color: var(--white);
      padding: 18px 16px;
      transition: background 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
      display: block;
    }

    .launch-card:active {
      transform: scale(0.985);
    }

    .launch-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.18);
    }

    .launch-label {
      margin: 0;
      font-size: clamp(24px, 6.8vw, 36px);
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .quick-links-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 2px;
    }

    .quick-links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .quick-link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px 10px;
      border-radius: 20px;
      text-decoration: none;
      color: #ffffff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
      text-align: center;
    }

    .quick-link-btn:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.18);
    }

    .quick-link-btn:active {
      transform: scale(0.985);
    }

    .quick-link-label {
      margin: 0;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      text-wrap: balance;
    }

    .footer-note {
      margin-top: auto;
      padding-top: 8px;
      font-size: 10px;
      line-height: 1.3;
      color: #b5d4d4;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.35px;
    }

    @media (max-width: 700px) {
      .popout-btn {
        display: none;
      }
    }

    @media (max-width: 430px) {
      html,
      body {
        overflow-y: auto;
      }

      .frame {
        min-height: 100vh;
        min-height: 100dvh;
        height: auto;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        max-height: none;
        min-height: calc(100dvh - 24px);
        aspect-ratio: auto;
        border-radius: 28px;
        padding: 16px 14px 14px 14px;
      }

      .logo-clear {
        width: 78px;
        max-width: 78px;
      }

      .subtitle {
        max-width: 270px;
        font-size: 14px;
      }

      .launch-card {
        padding: 16px 14px;
        border-radius: 24px;
      }

      .quick-links-grid {
        gap: 8px;
      }

      .quick-link-btn {
        min-height: 54px;
        border-radius: 18px;
        padding: 10px 8px;
      }

      .quick-link-label {
        font-size: 11px;
      }

      .footer-note {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">

      <div class="content">
        <div class="top-actions">
          <button id="popoutBtn" class="popout-btn" type="button">Pop Out</button>
        </div>

        <div class="header">
          <img src="PV_Logo.png" alt="Pioneer Valley High School logo" class="logo-clear">
          <h1 class="title">PVHS Tools</h1>
          <p class="subtitle">Quick access to live campus countdowns and staff extension search.</p>
        </div>

        <div class="launcher-stack">
          <a class="launch-card" href="countdown.html">
            <h2 class="launch-label">Countdown Clock</h2>
          </a>

          <a class="launch-card" href="extension_search.html">
            <h2 class="launch-label">Extension Search</h2>
          </a>
        </div>

        <div class="quick-links-wrap">
          <div class="quick-links-grid">
            <a
              class="quick-link-btn"
              href="https://maintenance.facilitron.com/anonymous/SantaMariaJUHSD/newworkorder"
              target="_blank"
              rel="noopener noreferrer"
            >
              <p class="quick-link-label">Maintenance Work Orders</p>
            </a>

            <a
              class="quick-link-btn"
              href="https://smjuhsd.incidentiq.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <p class="quick-link-label">IT Work Orders</p>
            </a>

            <a
              class="quick-link-btn"
              href="https://login.frontlineeducation.com/login?signin=b3c0ce2383586187edfa948e954b74ce&clientId=superSuit#/login"
              target="_blank"
              rel="noopener noreferrer"
            >
              <p class="quick-link-label">Absence Requests</p>
            </a>

            <a
              class="quick-link-btn"
              href="https://smjuhsd-my.sharepoint.com/:x:/g/personal/etorres_smjuhsd_org/IQBiSObgdkR3R68_dXHYrDwfAbA5RpN-scClTiKQddgcsLU?rtime=Q2eJ9lSB3kg"
              target="_blank"
              rel="noopener noreferrer"
            >
              <p class="quick-link-label">In Lieu Spreadsheet</p>
            </a>
          </div>
        </div>

        <div class="footer-note">Created By: Mr. Silva</div>
      </div>
    </div>
  </div>

  <script>
    const popoutBtn = document.getElementById("popoutBtn");

    function openPopoutWindow() {
      const width = 460;
      const height = 980;
      const left = Math.max(0, Math.round((window.screen.width - width) / 2));
      const top = Math.max(0, Math.round((window.screen.height - height) / 2));

      window.open(
        window.location.href,
        "pvhsToolsPopout",
        [
          `width=${width}`,
          `height=${height}`,
          `left=${left}`,
          `top=${top}`,
          "resizable=yes",
          "scrollbars=no",
          "toolbar=no",
          "menubar=no",
          "location=no",
          "status=no"
        ].join(",")
      );
    }

    if (popoutBtn) {
      popoutBtn.addEventListener("click", openPopoutWindow);
    }
  </script>
</body>
</html>
