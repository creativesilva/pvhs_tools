<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Extension Search">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>PVHS Extension Search</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --side-margin: 12px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #021414; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--white); touch-action: pan-y; }

    .frame {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      /* Added consistent bottom padding */
      padding: max(12px, env(safe-area-inset-top)) var(--side-margin) max(var(--side-margin), env(safe-area-inset-bottom)) var(--side-margin);
    }

    .app {
      width: min(100%, 430px); aspect-ratio: 430 / 880; max-height: 100%;
      border-radius: 34px; overflow: hidden; position: relative; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; justify-content: center; padding: 18px 18px 16px 18px; text-align: center; isolation: isolate;
    }

    .ghost-logo {
      position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.072;
      filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; transform: translate(-50%, -50%);
    }

    .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; gap: 10px; height: 100%; }
    .top-actions { width: 100%; display: flex; justify-content: flex-end; align-items: center; min-height: 34px; }
    
    .popout-btn {
      appearance: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
      padding: 9px 11px; background: rgba(255,255,255,0.08); color: #ffffff;
      font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(4px);
    }

    .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .logo-clear { width: 52px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); }
    .page-title { flex: 1; font-size: 18px; font-weight: 900; color: #dff7f7; text-transform: uppercase; }
    
    .home-link {
      padding: 10px 12px; border-radius: 16px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12); color: var(--white); text-decoration: none;
      font-size: 12px; font-weight: 900; text-transform: uppercase;
    }

    .search-card, .results-card {
      width: 100%; border-radius: 28px; background: var(--panel); border: 1px solid var(--panel-border);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }

    .search-card { padding: 16px 14px; }
    .results-card { padding: 12px 12px 0 12px; text-align: left; flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .search-title { margin: 0 0 4px 0; font-size: clamp(20px, 6vw, 32px); font-weight: 900; text-transform: uppercase; }
    .helper-text { margin: 0 0 12px 0; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

    .search-input {
      width: 100%; border: 1px solid rgba(255,255,255,0.16); border-radius: 18px;
      padding: 14px; font-size: 16px; font-weight: 700; color: #ffffff; background: rgba(0,0,0,0.18); outline: none;
    }

    .result-count { margin-bottom: 8px; font-size: 11px; font-weight: 900; color: #dff7f7; text-transform: uppercase; text-align: center; }
    
    .results-list { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      overflow-y: auto; 
      padding-right: 2px;
      padding-bottom: 20px; /* This ensures the last item has space at the bottom */
    }
    
    .result-item {
      border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      padding: 12px; transition: background 0.2s;
    }

    .result-name { margin: 0 0 2px 0; font-size: 16px; font-weight: 900; color: #ffffff; text-transform: uppercase; }
    .result-line { margin: 0; font-size: 11px; font-weight: 800; color: #d8f1f1; text-transform: uppercase; opacity: 0.9; }
    .result-ext { margin-top: 6px; font-size: 15px; font-weight: 900; color: #ffffff; }

    .footer-note { margin-top: auto; padding: 8px 0; font-size: 9px; color: #b5d4d4; text-transform: uppercase; font-weight: 700; }

    @media (max-width: 430px) {
      .frame { padding: 12px; height: 100dvh; }
      .app { width: 100%; border-radius: 24px; aspect-ratio: auto; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="top-actions">
          <button id="popoutBtn" class="popout-btn" type="button">Pop Out</button>
        </div>
        <div class="topbar">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <h1 class="page-title">PVHS Search</h1>
          <a class="home-link" href="index.html">Home</a>
        </div>
        <div class="search-card">
          <h2 class="search-title">Directory</h2>
          <p class="helper-text">Search by Name, Dept, or Ext</p>
          <input id="searchInput" class="search-input" type="text" placeholder="Silva, Math, 5105..." autocomplete="off">
        </div>
        <div class="results-card">
          <p class="result-count" id="resultCount">Recommended Contacts</p>
          <div class="results-list" id="resultsList"></div>
        </div>
        <div class="footer-note">PVHS Staff Directory 2025-2026</div>
      </div>
    </div>
  </div>

  <script>
    const extensionSearch = [
      { name: "PVHS Emergency Line", role: "Emergency", extension: "5000", keywords: ["emergency", "urgent"] },
      { name: "PVHS Maintenance", role: "Emergency", extension: "878-8155", keywords: ["maint", "urgent"] },
      { name: "Chris Silva", role: "VPA / Teacher", extension: "5322", room: "322", keywords: ["photography", "vpa", "art"] },
      { name: "Laura Garcia Solorio", role: "VPA / Teacher", extension: "5322", room: "322", keywords: ["vpa", "art"] },
      { name: "Araceli Mandujano", role: "Admin Assistant", extension: "5702", department: "Administration" },
      { name: "Kevin Ilac", role: "Assistant Principal", extension: "5703", department: "Administration" },
      { name: "Merrie Okie-Goldin", role: "Assistant Principal", extension: "5707", department: "Administration" },
      { name: "Jeff Hromadka", role: "Assistant Principal", extension: "5709", department: "Administration" },
      { name: "Christian Basulto", role: "Dean", extension: "5122", department: "Administration" },
      { name: "Chris Carrillo", role: "Counselor / Dept Chair", extension: "5198", department: "Guidance" },
      { name: "Susan Avrit", role: "Counselor", extension: "5775", department: "Guidance" },
      { name: "Heydi Elenes", role: "Counselor", extension: "5768", department: "Guidance" },
      { name: "Sandra Gonzalez", role: "Counselor", extension: "5765", department: "Guidance" },
      { name: "Nadia Mancha", role: "Counselor", extension: "5767", department: "Guidance" },
      { name: "Rocio Trujillo", role: "Counselor", extension: "5763", department: "Guidance" },
      { name: "Brooke Baarstad", role: "Math / Dept Chair", extension: "5209", department: "Math" },
      { name: "Sharon Domingues", role: "Math / Site Council", extension: "5456", department: "Math" },
      { name: "Hector Guerra", role: "Agriculture / Dept Chair", extension: "5207", department: "Agriculture" },
      { name: "Gabriel Ponce", role: "Agriculture / Dept Chair", extension: "5208", department: "Agriculture" },
      { name: "Selyn Harwin", role: "VPA / Dept Chair", extension: "5202", department: "VPA", room: "Drama" },
      { name: "Christine Linne", role: "Ind Tech / Dept Chair", extension: "5204", department: "Industrial Tech" },
      { name: "Scott Wonnell", role: "Ind Tech / Dept Chair", extension: "5205", department: "Industrial Tech" },
      { name: "Riccardo Magni", role: "Science / Dept Chair", extension: "5411", department: "Science" },
      { name: "Brett Dodson", role: "Social Science / Dept Chair", extension: "5634", department: "Social Science" },
      { name: "Eric Jeffres", role: "Special Ed / Dept Chair", extension: "5363", department: "Special Ed" },
      { name: "John Ruiz", role: "Special Ed / Dept Chair", extension: "5629", department: "Special Ed" },
      { name: "Jesse Zambrano", role: "Int Lang / Dept Chair", extension: "5213", department: "International Languages" },
      { name: "Annette MacCuish", role: "English / Dept Chair", extension: "5365", department: "English" },
      { name: "Jim Doyle", role: "PE / Dept Chair", extension: "5514", department: "PE" },
      { name: "Lisa Walters", role: "Activities Director", extension: "5508", department: "ASB" },
      { name: "Eddie Hernandez", role: "Security", extension: "5773" },
      { name: "Karine Perez", role: "Admin Asst", extension: "5123", department: "Administration" },
      { name: "Attendance Office", role: "Office", extension: "5105 / 5107" },
      { name: "Health Office", role: "Nurse", extension: "5760" },
      { name: "Library", role: "Librarian", extension: "5101" },
      { name: "Wellness Center", role: "Support", extension: "5310" },
      { name: "Elias Camacho", role: "Maintenance Lead", extension: "5276" },
      { name: "Tyson Ellis", role: "Plant Manager", extension: "5276" },
      { name: "Ben Alberry", role: "Special Ed Coord", extension: "5758" },
      { name: "Juan Antonio-Martinez", role: "EAOP Counselor", extension: "5692" },
      { name: "Rudy Binkele", role: "Teacher", extension: "5352", department: "English" },
      { name: "Britta Bonaventure", role: "Teacher", extension: "5353", department: "English" },
      { name: "Alan Brafman", role: "Teacher", extension: "5217", department: "Int Lang" },
      { name: "Bilena Brafman", role: "Teacher", extension: "5302", department: "English" },
      { name: "Dustin Cornejo", role: "Teacher", extension: "5632", department: "Social Science" },
      { name: "Tyler Dickinson", role: "Teacher", extension: "5311", department: "Agriculture" },
      { name: "Stephanie Fikri", role: "Teacher", extension: "5312", department: "VPA" },
      { name: "Michele Lyon", role: "Teacher", extension: "5606", department: "Special Ed" },
      { name: "Teri Wisz (formerly Magni)", role: "Teacher", extension: "5301", department: "English" },
      { name: "Tech Help Desk", role: "IT Support", extension: "4612" }
    ];

    const defaultSuggestions = ["PVHS Emergency Line", "PVHS Maintenance", "Eddie Hernandez", "Karine Perez"];

    // Levenshtein Logic for fuzzy searching
    function getLevenshteinDistance(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
      for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
      }
      return matrix[a.length][b.length];
    }

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("resultsList");
    const resultCount = document.getElementById("resultCount");

    function normalizeText(text) {
      return (text || "").toLowerCase().trim();
    }

    function renderResults(query) {
      const q = normalizeText(query);
      let results = [];

      if (!q) {
        results = extensionSearch.filter(e => defaultSuggestions.includes(e.name));
        resultCount.textContent = "Recommended Contacts";
      } else {
        // Step 1: Filter by direct inclusion (standard search)
        results = extensionSearch.filter(e => {
          const searchSpace = [e.name, e.role, e.department, e.extension, e.room, ...(e.keywords || [])].join(" ").toLowerCase();
          return searchSpace.includes(q);
        });

        // Step 2: If no direct matches, use fuzzy logic on names
        if (results.length === 0 && q.length > 2) {
          results = extensionSearch
            .map(e => ({ ...e, dist: getLevenshteinDistance(q, e.name.toLowerCase().split(' ').pop()) })) // check last name
            .filter(e => e.dist <= 2) // tolerance of 2 typos
            .sort((a, b) => a.dist - b.dist);
        }
        
        resultCount.textContent = results.length > 0 ? `${results.length} found` : "No results found";
      }

      resultsList.innerHTML = results.length ? "" : '<p style="text-align:center; padding:20px; opacity:0.6;">No matches found. Try a department or extension.</p>';

      results.forEach(entry => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <p class="result-name">${entry.name}</p>
          <p class="result-line">${entry.role}${entry.department ? ' • ' + entry.department : ''}</p>
          ${entry.room ? `<p class="result-line">Room: ${entry.room}</p>` : ''}
          <p class="result-ext">Ext: ${entry.extension}</p>
        `;
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    renderResults("");
  </script>
</body>
</html>
