  <meta name="apple-mobile-web-app-title" content="PVHS Extension Search">

  <title>PVHS Extension Search</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --white-gradient: linear-gradient(180deg, #ffffff 0%, #dceaea 100%);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #021414;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      touch-action: pan-y;
    }

    .frame {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
    }

    .app {
      width: min(100%, 430px);
      min-height: min(94vh, 920px);
      min-height: min(94dvh, 920px);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px 14px 14px 14px;
      text-align: center;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.06) 0%, transparent 34%),
        radial-gradient(circle at top, rgba(0,116,116,0.22) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo {
      position: absolute;
      top: 56%;
      left: 50%;
      width: 178%;
      max-width: none;
      transform: translate(-50%, -50%);
      opacity: 0.072;
      filter: grayscale(100%) contrast(108%) brightness(114%);
      pointer-events: none;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 2px;
    }

    .logo-clear {
      width: 52px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24));
      flex: 0 0 auto;
    }

    .page-title {
      flex: 1 1 auto;
      margin: 0;
      font-size: 18px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.8px;
      color: #dff7f7;
      text-transform: uppercase;
      text-align: center;
    }

    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--white);
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .search-card,
    .results-card {
      width: 100%;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .search-card {
      padding: 16px 14px 14px 14px;
    }

    .results-card {
      padding: 12px;
      text-align: left;
      min-height: 320px;
    }

    .search-title {
      margin: 0 0 8px 0;
      font-size: clamp(24px, 7vw, 40px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.6px;
      text-transform: uppercase;
    }

    .helper-text {
      margin: 0 0 12px 0;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
    }

    .search-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      padding: 14px 14px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: rgba(0,0,0,0.18);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .search-input::placeholder {
      color: #bdd5d5;
      opacity: 0.9;
    }

    .result-count {
      margin: 0 0 10px 0;
      font-size: 11px;
      line-height: 1.3;
      font-weight: 900;
      color: #dff7f7;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 12px 12px 10px 12px;
    }

    .result-name {
      margin: 0 0 4px 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
    }

    .result-role,
    .result-dept,
    .result-ext {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 800;
      color: #d8f1f1;
      text-transform: uppercase;
    }

    .result-ext {
      margin-top: 6px;
      font-size: 15px;
      color: #ffffff;
      letter-spacing: 0.2px;
    }

    .empty-state {
      margin: 0;
      padding: 14px 10px;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 800;
      color: #d8f1f1;
      text-transform: uppercase;
      text-align: center;
    }

    .footer-note {
      margin-top: auto;
      padding-top: 2px;
      font-size: 10px;
      line-height: 1.3;
      color: #b5d4d4;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.35px;
    }

    @media (max-width: 430px) {
      .app {
        min-height: 100vh;
        min-height: 100dvh;
        border-radius: 28px;
        padding: 14px 12px 12px 12px;
      }

      .search-card,
      .results-card {
        border-radius: 24px;
      }
    }
  </style>

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s/]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

      const m = a.length;
      const n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;

      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[m][n];
    }

    function buildSearchText(entry) {
      return normalizeText([
        entry.name,
        entry.role,
        entry.department,
        entry.extension,
        entry.room ? `room ${entry.room}` : "",
        ...(entry.keywords || [])
      ].join(" "));
    }

    function scoreEntry(entry, query) {
      const q = normalizeText(query);
      const haystack = buildSearchText(entry);

      if (!q) return 1;

      if (haystack === q) return 200;
      if (normalizeText(entry.name) === q) return 180;
      if (normalizeText(entry.extension) === q) return 175;
      if (haystack.startsWith(q)) return 140;
      if (normalizeText(entry.name).startsWith(q)) return 150;
      if (haystack.includes(q)) return 120;

      const keywords = [entry.name, entry.role, entry.department, entry.extension, ...(entry.keywords || [])]
        .map(normalizeText)
        .filter(Boolean);

      let best = 0;

      for (const word of keywords) {
        if (word.startsWith(q)) best = Math.max(best, 110);
        if (word.includes(q)) best = Math.max(best, 100);

        const distance = levenshtein(q, word);
        if (q.length >= 4 && distance <= 2) best = Math.max(best, 88 - distance * 10);
        if (q.length >= 6 && distance <= 3) best = Math.max(best, 82 - distance * 8);
      }

      const tokens = q.split(" ").filter(Boolean);
      if (tokens.length > 1) {
        let matched = 0;
        for (const token of tokens) {
          if (haystack.includes(token)) matched++;
        }
        if (matched > 0) {
          best = Math.max(best, 70 + matched * 8);
        }
      }

      return best;
    }

    function getDisplayResults(query) {
      const q = normalizeText(query);

      if (!q) {
        return [
          extensionSearch.find(x => x.name === "Dr. Paul Robinson"),
          extensionSearch.find(x => x.name === "Receptionist"),
          extensionSearch.find(x => x.name === "Attendance Office"),
          extensionSearch.find(x => x.name === "Technology Help Desk"),
          extensionSearch.find(x => x.name === "Chris Silva"),
          extensionSearch.find(x => x.name === "Laura Garcia Solorio"),
          extensionSearch.find(x => x.name === "Christian Basulto"),
          extensionSearch.find(x => x.name === "Susan Avrit")
        ].filter(Boolean);
      }

      const scored = extensionSearch
        .map(entry => ({ entry, score: scoreEntry(entry, q) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.entry.name.localeCompare(b.entry.name))
        .slice(0, 12)
        .map(item => item.entry);

      return scored;
    }

    function renderResults(query) {
      const results = getDisplayResults(query);
      resultsList.innerHTML = "";

      if (!normalizeText(query)) {
        resultCount.textContent = "Showing suggested contacts";
      } else {
        resultCount.textContent = `${results.length} result${results.length === 1 ? "" : "s"} found`;
      }

      if (!results.length) {
        resultsList.innerHTML = `<p class="empty-state">No close matches found. Try a last name, department, role, room number, or extension.</p>`;
        return;
      }

      for (const entry of results) {
        const item = document.createElement("div");
        item.className = "result-item";

        const roomLine = entry.room ? `<p class="result-dept">ROOM: ${entry.room}</p>` : "";

        item.innerHTML = `
          <p class="result-name">${entry.name}</p>
          <p class="result-role">${entry.role}</p>
          <p class="result-dept">${entry.department}</p>
          ${roomLine}
          <p class="result-ext">EXTENSION: ${entry.extension}</p>
        `;

        resultsList.appendChild(item);
      }
    }

    searchInput.addEventListener("input", () => {
      renderResults(searchInput.value);
    });

    renderResults("");
  </script>
</body>
</html>
