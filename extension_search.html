<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>Extension Search</title>

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --app-spacing: 18px; --radius: 34px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #021414; }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--white); }

    .frame { 
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
    }

    .app {
      width: min(100%, 430px); height: 100%; max-height: calc(100dvh - 24px);
      aspect-ratio: 430 / 880; border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column; padding: 20px var(--app-spacing) var(--app-spacing) var(--app-spacing);
      isolation: isolate;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }
    
    .content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    
    .action-pill { display: flex; align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--panel-border); border-radius: 14px; overflow: hidden; backdrop-filter: blur(4px); margin-bottom: 2px; flex-shrink: 0; }
    .pill-btn { appearance: none; background: transparent; border: none; color: #fff; font-size: 11px; font-weight: 900; text-transform: uppercase; padding: 10px 12px; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
    .pill-divider { width: 1px; background: var(--panel-border); height: 100%; }

    .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; flex-shrink: 0; }
    .logo-clear { width: 44px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); }
    .page-title { flex: 1; font-size: 18px; font-weight: 900; color: #dff7f7; text-transform: uppercase; margin: 0; text-align: center; letter-spacing: 1px; }

    .search-card { padding: 16px 14px; border-radius: 28px; background: var(--panel); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); flex-shrink: 0; box-shadow: var(--soft-shadow); }
    .search-title { margin: 0 0 4px 0; font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
    .helper-text { margin: 0 0 12px 0; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .search-input { width: 100%; border: 1px solid rgba(255,255,255,0.16); border-radius: 18px; padding: 14px; font-size: 16px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.18); outline: none; }

    .results-card { 
      padding: 14px 14px 0 14px; border-radius: 28px; background: var(--panel); border: 1px solid var(--panel-border); 
      backdrop-filter: blur(10px); box-shadow: var(--soft-shadow);
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }
    .result-count { margin-bottom: 10px; font-size: 11px; font-weight: 900; color: #dff7f7; text-transform: uppercase; text-align: center; opacity: 0.8; flex-shrink: 0;}
    
    .results-list { 
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px;
      -webkit-overflow-scrolling: touch;
    }

    .result-item { border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); padding: 12px; flex-shrink: 0; }
    .result-name { margin: 0 0 2px 0; font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; }
    .result-line { margin: 0; font-size: 11px; font-weight: 800; color: #d8f1f1; text-transform: uppercase; opacity: 0.8; }
    .result-ext { margin-top: 6px; font-size: 15px; font-weight: 900; color: #fff; }

    .footer-note { margin-top: auto; padding-top: 8px; font-size: 10px; color: #b5d4d4; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; text-align: center; flex-shrink: 0; }

    @media (max-width: 430px) {
      .frame { align-items: flex-start; }
      .app { width: 100%; aspect-ratio: auto; min-height: calc(100dvh - 24px); border-radius: 28px; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="action-pill">

          <div id="popoutSection" style="display: flex;">
            <div class="pill-divider"></div>
            <button id="popoutBtn" class="pill-btn" type="button">Pop Out</button>
          </div>
        </div>

        <div class="topbar">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <h1 class="page-title">Extension Search</h1>
        </div>

        <div class="search-card">
          <h2 class="search-title">Directory</h2>
          <p class="helper-text">Search Name, Dept, or Ext</p>
          <input id="searchInput" class="search-input" type="text" placeholder="Guerra, Wisz, 5105..." autocomplete="off">
        </div>

        <div class="results-card">
          <p class="result-count" id="resultCount">Recommended Contacts</p>
          <div class="results-list" id="resultsList"></div>
        </div>

        <div class="footer-note">CREATED BY: MR. SILVA</div>
      </div>
    </div>
  </div>

    const defaultSuggestions = ["PVHS Emergency Line", "Julie Norris", "Eddie Hernandez", "Karine Perez"];

    function getLevenshteinDistance(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
      for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
      }
      return matrix[a.length][b.length];
    }

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("resultsList");
    const resultCount = document.getElementById("resultCount");

    function renderResults(query) {
      const q = query.toLowerCase().trim();
      let results = [];

      if (!q) {
        results = extensionSearch.filter(e => defaultSuggestions.includes(e.name));
        resultCount.textContent = "Recommended Contacts";
      } else {
        results = extensionSearch.filter(e => {
          const searchSpace = [e.name, (e.role || ""), (e.extension || ""), (e.room || "")].join(" ").toLowerCase();
          return searchSpace.includes(q);
        });

        if (results.length === 0 && q.length >= 3) {
           results = extensionSearch
            .map(e => ({ ...e, dist: getLevenshteinDistance(q, e.name.toLowerCase().split(' ').pop().substring(0, q.length)) }))
            .filter(e => e.dist <= 1)
            .sort((a, b) => a.dist - b.dist);
        }
        resultCount.textContent = results.length > 0 ? `${results.length} found` : "No results found";
      }

      resultsList.innerHTML = results.length ? "" : '<p style="text-align:center; padding:20px; opacity:0.6; font-size:12px;">NO MATCHES FOUND</p>';

      results.forEach(entry => {
        const isPhoneNumber = entry.extension.replace(/[^0-9]/g, "").length > 4;
        const label = isPhoneNumber ? "Phone" : "Ext";
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `<p class="result-name">${entry.name}</p><p class="result-line">${entry.role}</p>${entry.room ? `<p class="result-line">Room: ${entry.room}</p>` : ''}<p class="result-ext">${label}: ${entry.extension}</p>`;
        resultsList.appendChild(div);
      });
    }

    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    document.getElementById("popoutBtn")?.addEventListener("click", () => {
      window.open(window.location.href + '?popout=true', 'popout', 'width=430,height=880');
    });

    if (window.name === 'popout' || window.location.search.includes('popout=true')) {
      document.getElementById('popoutSection').style.display = 'none';
    }

    renderResults("");
