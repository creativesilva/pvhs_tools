<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png?v=12">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png?v=12">
  <link rel="icon" type="image/png" sizes="512x512" href="PV_Logo.png?v=12">
  <link rel="shortcut icon" href="PV_Logo.png?v=12">
  <title>PVHS Tools</title>

  <style>
    :root {
      --teal: #007474;
      --teal-dark: #003c3c;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --glow: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%);
      --card-hover: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background: #021414;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      touch-action: pan-y;
    }

    .frame {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    }

    .app {
      width: min(100%, 430px);
      min-height: min(92vh, 900px);
      min-height: min(92dvh, 900px);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex;
      justify-content: center;
      padding: 22px 18px 18px 18px;
      text-align: center;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        var(--glow),
        radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo {
      position: absolute;
      top: 54%;
      left: 50%;
      width: clamp(155%, 180vw, 205%);
      max-width: none;
      transform: translate(-50%, -50%);
      opacity: 0.07;
      filter: grayscale(100%) contrast(108%) brightness(114%);
      pointer-events: none;
      z-index: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-top: 2px;
    }

    .logo-clear {
      width: 92px;
      max-width: 92px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24));
    }

    .eyebrow {
      margin: 0;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.8px;
      color: #dff7f7;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: clamp(38px, 11vw, 60px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0;
      max-width: 300px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--muted);
      text-wrap: balance;
    }

    .launcher-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 6px;
    }

    .launch-card {
      width: 100%;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      text-decoration: none;
      color: var(--white);
      padding: 18px 16px;
      transition: background 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
      display: block;
    }

    .launch-card:active {
      transform: scale(0.985);
    }

    .launch-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.18);
    }

    .launch-label {
      margin: 0 0 8px 0;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .launch-desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .footer-note {
      margin-top: auto;
      padding-top: 10px;
      font-size: 11px;
      line-height: 1.3;
      color: #b5d4d4;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.35px;
    }

    @media (max-width: 430px) {
      .app {
        min-height: 100vh;
        min-height: 100dvh;
        border-radius: 28px;
        padding: 18px 14px 14px 14px;
      }

      .logo-clear {
        width: 82px;
        max-width: 82px;
      }

      .subtitle {
        max-width: 280px;
        font-size: 15px;
      }

      .launch-card {
        padding: 16px 14px;
        border-radius: 24px;
      }

      .launch-desc {
        font-size: 13px;
      }

      .footer-note {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="header">
          <img src="PV_Logo.png" alt="Pioneer Valley High School logo" class="logo-clear">
          <p class="eyebrow">Official PVHS Tool</p>
          <h1 class="title">PVHS Tools</h1>
          <p class="subtitle">Quick access to live campus countdowns and staff extension search.</p>
        </div>

        <div class="launcher-stack">
          <a class="launch-card" href="countdown.html">
            <h2 class="launch-label">Countdown Clock</h2>
            <p class="launch-desc">Live period countdown, school days left, and campus schedule tools.</p>
          </a>

          <a class="launch-card" href="extension_search.html">
            <h2 class="launch-label">Extension Search</h2>
            <p class="launch-desc">Search names, departments, positions, and phone extensions.</p>
          </a>
        </div>

        <div class="footer-note">Created By: Mr. Silva</div>
      </div>
    </div>
  </div>
</body>
</html>
