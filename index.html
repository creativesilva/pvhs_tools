<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="PV_AppIcon.png">
  <link rel="icon" type="image/png" sizes="1024x1024" href="PV_AppIcon.png">
  <title>PVHS Tools</title>

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12); --app-spacing: 18px; --radius: 34px;
      --standalone-app-width: 100vw; --standalone-app-height: 100dvh;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    html, body { width: 100%; height: 100%; min-height: 100%; background: #021414; overflow: hidden; }
    body { min-height: 100vh; min-height: 100dvh; min-height: -webkit-fill-available; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; color: var(--white); touch-action: none; user-select: none; }

    /* The Frame ensures app stays centered with margins on Desktop/Popout */
    .frame { 
      width: 100%; height: 100dvh; min-height: 100vh; min-height: -webkit-fill-available; display: flex; align-items: center; justify-content: center; 
      padding: 10px;
    }

    /* THE PERMANENT IPHONE BUBBLE */
    .app {
      width: 430px; height: 880px; max-width: 100%; max-height: 100%;
      border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column; isolation: isolate;
      container-type: inline-size;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }
    
    .content { 
      position: relative; z-index: 1; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; 
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 4px var(--app-spacing) 14px var(--app-spacing);
    }
    
    .top-actions { width: 100%; display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }

    /* Flat Style Pop Out Pill */
    .popout-pill {
      display: none; appearance: none;
      background: rgba(255, 255, 255, 0.08); border: 1px solid var(--panel-border);
      border-radius: 14px; padding: 9px 14px; color: #fff; font-size: 11px; font-weight: 900; 
      text-transform: uppercase; cursor: pointer; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .popout-pill:active { background: var(--card-hover); }

    .header { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: -4px; }
    .logo-clear { width: 64px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); }
    .title { margin: 0; font-size: clamp(34px, 10vw, 40px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; text-align: center; line-height: 0.95; }
    .greeting { margin: 2px 0 0 0; font-size: 11px; font-weight: 800; color: #00d1d1; text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { margin: 2px 0 8px 0; max-width: 292px; font-size: 11px; line-height: 1.25; font-weight: 700; color: var(--muted); text-align: center; }

    .launcher-stack { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .launch-card {
      width: 100%; min-height: 52px; border-radius: 20px; background: var(--panel); border: 1px solid var(--panel-border);
      text-decoration: none; color: var(--white); padding: 8px 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .launch-card:active { transform: scale(0.98); background: var(--card-hover); }
    .launch-label { font-size: 17px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

    .quick-links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
    .quick-link-btn {
      display: flex; align-items: center; justify-content: center; min-height: 52px;
      padding: 8px; border-radius: 17px; text-decoration: none; color: #fff;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); text-align: center;
      transition: background 0.2s;
    }
    .quick-link-btn:active { background: var(--card-hover); }
    .quick-link-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.45px; }

    .footer-note { margin-top: auto; padding: 10px 0 4px 0; font-size: 10px; color: #b5d4d4; font-weight: 800; text-align: center; flex-shrink: 0; }

    body.is-standalone {
      background: #021414;
    }

    body.is-standalone::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #021414;
      pointer-events: none;
      z-index: 0;
    }

    body.is-standalone .frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      padding: 0 8px max(24px, calc(env(safe-area-inset-bottom) + 8px)) 8px;
      z-index: 1;
    }

    body.is-standalone .app {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 46px rgba(0,0,0,0.22);
    }

    body.is-standalone .content {
      padding-top: max(4px, env(safe-area-inset-top));
      padding-right: max(var(--app-spacing), env(safe-area-inset-right));
      padding-bottom: 18px;
      padding-left: max(var(--app-spacing), env(safe-area-inset-left));
    }

    /* NATIVE APP OVERRIDE (Option B) */
    @media (max-width: 430px) {
      body:not(.is-popout):not(.is-standalone) .frame { 
        /* Injects Apple's Safe Area padding so it avoids the notch and swipe bar */
        padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px; 
      }
      body:not(.is-popout):not(.is-standalone) .app { 
        width: 100%; 
        height: 100%; 
        max-height: 100%; 
        border-radius: var(--radius); /* Restores the curved edges */
        border: 1px solid rgba(255,255,255,0.12); /* Maintains the glass border */
      }
      .popout-pill { display: none !important; }
      body { touch-action: pan-y; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="top-actions">
          <button id="popoutBtn" class="popout-pill" type="button">Pop Out</button>
        </div>
        <div class="header">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <p class="greeting" id="greetingText">Welcome</p>
          <h1 class="title">PVHS Tools</h1>
          <p class="subtitle">Quick access to campus tools and directory.</p>
        </div>
        <div class="launcher-stack">
          <a class="nav-link launch-card" href="countdown.html"><h2 class="launch-label">Countdown</h2></a>
          <a class="nav-link launch-card" href="extension_search.html"><h2 class="launch-label">Directory</h2></a>
        </div>
        <div class="quick-links-grid">
          <a class="quick-link-btn" href="https://www.facilitron.com/accounts/signin/" target="_blank"><p class="quick-link-label">Maintenance</p></a>
          <a class="quick-link-btn" href="https://smjuhsd.incidentiq.com/" target="_blank"><p class="quick-link-label">IT Support</p></a>
          <a class="quick-link-btn" href="https://login.frontlineeducation.com/login" target="_blank"><p class="quick-link-label">Absences</p></a>
          <a class="quick-link-btn" href="https://smjuhsd-my.sharepoint.com/:x:/g/personal/etorres_smjuhsd_org/IQBiSObgdkR3R68_dXHYrDwfAbA5RpN-scClTiKQddgcsLU" target="_blank"><p class="quick-link-label">In Lieu</p></a>
          <a class="quick-link-btn" href="https://drive.google.com/drive/home" target="_blank"><p class="quick-link-label">Google</p></a>
          <a class="quick-link-btn" href="https://www.parentsquare.com/signin" target="_blank"><p class="quick-link-label">ParentSquare</p></a>
          <a class="quick-link-btn" href="https://santamariajuhsd.aeries.net" target="_blank"><p class="quick-link-label">Aeries</p></a>
          <a class="quick-link-btn" href="https://smjuhsd.instructure.com/login/saml" target="_blank"><p class="quick-link-label">Canvas</p></a>
        </div>
        <div class="footer-note">By: CreativeSilva</div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const isPopout = mode === 'popout';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

    const popoutBtn = document.getElementById("popoutBtn");
    const navLinks = document.querySelectorAll(".nav-link");

    function updateStandaloneViewportVars() {
      if (!isStandalone) return;
      const heightCandidates = [
        window.innerHeight,
        window.outerHeight,
        window.visualViewport ? Math.round(window.visualViewport.height) : 0,
        window.screen ? window.screen.height : 0,
        window.screen ? window.screen.availHeight : 0
      ].filter(Boolean);
      const widthCandidates = [
        window.innerWidth,
        window.outerWidth,
        window.visualViewport ? Math.round(window.visualViewport.width) : 0,
        window.screen ? window.screen.width : 0,
        window.screen ? window.screen.availWidth : 0
      ].filter(Boolean);

      const appHeight = Math.max(...heightCandidates);
      const appWidth = Math.max(...widthCandidates);

      document.documentElement.style.setProperty('--standalone-app-height', `${appHeight}px`);
      document.documentElement.style.setProperty('--standalone-app-width', `${appWidth}px`);
    }

    if (isStandalone) {
      document.body.classList.add('is-standalone');
      updateStandaloneViewportVars();
      window.addEventListener('resize', updateStandaloneViewportVars);
      window.addEventListener('orientationchange', updateStandaloneViewportVars);
      window.addEventListener('pageshow', updateStandaloneViewportVars);
      window.visualViewport?.addEventListener('resize', updateStandaloneViewportVars);
      setTimeout(updateStandaloneViewportVars, 250);
      setTimeout(updateStandaloneViewportVars, 800);
    }

    if (isPopout) {
      document.body.classList.add('is-popout');
      if (popoutBtn) popoutBtn.remove();
      navLinks.forEach(link => {
        const url = new URL(link.href, window.location.origin);
        url.searchParams.set('mode', 'popout');
        link.href = url.toString();
      });
    } else if (!isMobile && !isStandalone) {
      if (popoutBtn) popoutBtn.style.display = 'block';
    }

    // Keep internal navigation inside the installed app.
    if (isStandalone) {
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const nextHref = link.getAttribute('href');
          if (nextHref) window.location.assign(nextHref);
        });
      });
    }

    const hours = new Date().getHours();
    const greet = hours < 12 ? "Good Morning" : hours < 18 ? "Good Afternoon" : "Good Evening";
    document.getElementById('greetingText').textContent = greet;

    document.getElementById("popoutBtn")?.addEventListener("click", () => {
      window.open('index.html?mode=popout', 'pvTools', 'width=450,height=900,resizable=yes,scrollbars=no');
    });
  </script>
</body>
</html>
