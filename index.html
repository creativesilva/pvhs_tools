<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="PV_AppIcon.png">
  <link rel="icon" type="image/png" sizes="1024x1024" href="PV_AppIcon.png">
  <title>PVHS Tools</title>

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08); --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12); --app-spacing: 16px; --radius: 34px;
      --standalone-app-width: 100vw; --standalone-app-height: 100dvh;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    html, body { width: 100%; height: 100%; min-height: 100%; background: #021414; overflow: hidden; }
    body { min-height: 100vh; min-height: 100dvh; min-height: -webkit-fill-available; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; color: var(--white); touch-action: none; user-select: none; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    /* The Frame ensures app stays centered with margins on Desktop/Popout */
    .frame { 
      width: 100%; height: 100dvh; min-height: 100vh; min-height: -webkit-fill-available; display: flex; align-items: center; justify-content: center; 
      padding: 10px;
    }

    /* THE PERMANENT IPHONE BUBBLE */
    .app {
      width: 430px; height: 880px; max-width: 100%; max-height: 100%;
      border-radius: var(--radius); 
      overflow: hidden; position: relative; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column; isolation: isolate;
      container-type: inline-size;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }
    
    .content { 
      position: relative; z-index: 1; width: 100%; height: 100%; 
      display: flex; flex-direction: column; align-items: center; 
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 10px var(--app-spacing) 12px var(--app-spacing);
    }
    
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
      height: 42px;
      flex-shrink: 0;
      margin-bottom: 6px;
    }

    /* ── NAV DROPDOWN MENU ─────────────────────────────── */
    .nav-menu-btn {
      appearance: none; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13); border-radius: 12px;
      color: rgba(255,255,255,0.92); width: 34px; height: 34px;
      font-size: 14px; font-weight: 900; letter-spacing: 0.08em;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.16s, border-color 0.16s;
    }
    .nav-menu-btn.is-open,
    .nav-menu-btn:active { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.26); }
    .nav-menu {
      position: fixed; z-index: 9999; min-width: 172px;
      background: rgba(3, 20, 20, 0.97);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px; padding: 5px;
      box-shadow: 0 14px 44px rgba(0,0,0,0.52);
      backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px);
      transform-origin: top right;
      transform: scale(0.88) translateY(-8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.17s ease, transform 0.19s cubic-bezier(0.34,1.4,0.64,1);
    }
    .nav-menu.is-open { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .nav-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 11px;
      text-decoration: none; color: #eaf8f8; background: transparent;
      font-size: 11.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; border: none; cursor: pointer; width: 100%;
      transition: background 0.13s;
    }
    .nav-menu-item:active { background: rgba(255,255,255,0.1); }
    .nav-menu-icon { font-size: 14px; flex-shrink: 0; }
    .nav-menu-sep { height: 1px; background: rgba(255,255,255,0.09); margin: 3px 6px; }

    .logo-clear { width: 42px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); flex-shrink: 0; }
    .page-title { flex: 1; font-size: 15px; font-weight: 700; color: #dff7f7; text-transform: uppercase; margin: 0; text-align: left; letter-spacing: 0.14em; }
    .header { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: 0; }
    .greeting { margin: 2px 0 0 0; font-size: 15px; font-weight: 700; color: #4be1e1; text-transform: uppercase; letter-spacing: 0.14em; }
    .subtitle { margin: 6px 0 10px 0; max-width: 296px; font-size: 10.5px; line-height: 1.35; font-weight: 500; color: var(--muted); text-align: center; }

    .launcher-stack { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .launch-card {
      width: 100%; min-height: 50px; border-radius: 18px; background: rgba(255,255,255,0.07); border: 1px solid var(--panel-border);
      text-decoration: none; color: var(--white); padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.2s, transform 0.1s;
    }
    .launch-card:active { transform: scale(0.98); background: var(--card-hover); }
    .launch-icon { font-size: 18px; opacity: 0.75; flex-shrink: 0; }
    .launch-label { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; flex: 1; text-align: center; }
    .launch-chevron { font-size: 20px; font-weight: 300; opacity: 0.38; flex-shrink: 0; line-height: 1; }

    .section-label { width: 100%; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); opacity: 0.65; margin-bottom: 5px; padding-left: 3px; }
    .quick-links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
    .quick-link-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 52px;
      padding: 8px 6px; border-radius: 17px; text-decoration: none; color: #fff;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); text-align: center;
      gap: 4px; transition: background 0.2s;
    }
    .quick-link-btn:active { background: var(--card-hover); }
    .quick-link-icon { font-size: 17px; line-height: 1; display: block; }
    .quick-link-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em; line-height: 1; }

    .footer-note { margin-top: auto; padding: 9px 0 2px 0; font-size: 9.5px; color: #b5d4d4; font-weight: 600; text-align: center; flex-shrink: 0; }

    /* ── ADD TO HOME SCREEN PROMPT ─────────────────────── */
    .a2hs-prompt {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 0 14px 16px;
      transform: translateY(110%);
      transition: transform 0.48s cubic-bezier(0.34, 1.36, 0.64, 1);
      pointer-events: none;
    }
    .a2hs-prompt.is-visible { transform: translateY(0); pointer-events: auto; }
    .a2hs-inner {
      display: flex; align-items: center; gap: 11px;
      background: rgba(2, 22, 22, 0.93);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px; padding: 12px 14px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 -6px 28px rgba(0,0,0,0.34);
    }
    .a2hs-icon { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; }
    .a2hs-text { flex: 1; }
    .a2hs-title { font-size: 11.5px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.11em; margin: 0 0 3px; }
    .a2hs-desc  { font-size: 10px; font-weight: 500; color: var(--muted); line-height: 1.45; margin: 0; }
    .a2hs-share {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(0,130,255,0.85); color: #fff;
      border-radius: 5px; padding: 1px 4px; font-size: 10px; font-weight: 700;
      vertical-align: middle; margin: 0 1px;
    }
    .a2hs-dismiss {
      appearance: none; background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
      border-radius: 99px; width: 26px; height: 26px; font-size: 12px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .a2hs-dismiss:active { background: rgba(255,255,255,0.18); }

    body.is-standalone {
      background: #021414;
    }

    body.is-standalone::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #021414;
      pointer-events: none;
      z-index: 0;
    }

    body.is-standalone .frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      padding: 0 8px max(24px, calc(env(safe-area-inset-bottom) + 8px)) 8px;
      z-index: 1;
    }

    body.is-standalone .app {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 46px rgba(0,0,0,0.22);
    }

    body.is-standalone .content {
      padding-top: max(10px, env(safe-area-inset-top));
      padding-right: max(var(--app-spacing), env(safe-area-inset-right));
      padding-bottom: 14px;
      padding-left: max(var(--app-spacing), env(safe-area-inset-left));
    }

    /* NATIVE APP OVERRIDE (Option B) */
    @media (max-width: 430px) {
      body:not(.is-popout):not(.is-standalone) .frame { 
        /* Injects Apple's Safe Area padding so it avoids the notch and swipe bar */
        padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px; 
      }
      body:not(.is-popout):not(.is-standalone) .app { 
        width: 100%; 
        height: 100%; 
        max-height: 100%; 
        border-radius: var(--radius); /* Restores the curved edges */
        border: 1px solid rgba(255,255,255,0.12); /* Maintains the glass border */
      }
      /* nav menu always visible */
      body { touch-action: pan-y; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">
      <div class="content">
        <div class="top-row">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <h1 class="page-title">Tools</h1>
          <button id="navMenuBtn" class="nav-menu-btn" type="button" aria-label="Menu" aria-expanded="false">···</button>
        </div>
        <div class="header">
          <p class="greeting" id="greetingText">Welcome</p>
        </div>
        <div class="launcher-stack">
          <a class="nav-link launch-card" href="countdown.html">
            <span class="launch-icon">⏱</span>
            <h2 class="launch-label">Countdown</h2>
            <span class="launch-chevron">›</span>
          </a>
          <a class="nav-link launch-card" href="extension_search.html">
            <span class="launch-icon">🔍</span>
            <h2 class="launch-label">Directory</h2>
            <span class="launch-chevron">›</span>
          </a>
        </div>
        <p class="section-label">Quick Links</p>
        <div class="quick-links-grid">
          <a class="quick-link-btn" href="https://www.facilitron.com/accounts/signin/" target="_blank"><span class="quick-link-icon">🔧</span><p class="quick-link-label">Maintenance</p></a>
          <a class="quick-link-btn" href="https://smjuhsd.incidentiq.com/" target="_blank"><span class="quick-link-icon">🖥️</span><p class="quick-link-label">IT Support</p></a>
          <a class="quick-link-btn" href="https://login.frontlineeducation.com/login" target="_blank"><span class="quick-link-icon">📋</span><p class="quick-link-label">Absences</p></a>
          <a class="quick-link-btn" href="https://smjuhsd-my.sharepoint.com/:x:/g/personal/etorres_smjuhsd_org/IQBiSObgdkR3R68_dXHYrDwfAbA5RpN-scClTiKQddgcsLU" target="_blank"><span class="quick-link-icon">📝</span><p class="quick-link-label">In Lieu</p></a>
          <a class="quick-link-btn" href="https://drive.google.com/drive/home" target="_blank"><span class="quick-link-icon">📁</span><p class="quick-link-label">Google</p></a>
          <a class="quick-link-btn" href="https://www.parentsquare.com/signin" target="_blank"><span class="quick-link-icon">💬</span><p class="quick-link-label">ParentSquare</p></a>
        </div>
        <div class="footer-note">By: CreativeSilva</div>
      </div>

      <!-- NAV DROPDOWN -->
      <div id="navMenu" class="nav-menu" role="menu">
        <a href="countdown.html"       class="nav-menu-item nav-link" role="menuitem"><span class="nav-menu-icon">⏱</span>Countdown</a>
        <a href="extension_search.html" class="nav-menu-item nav-link" role="menuitem"><span class="nav-menu-icon">🔍</span>Directory</a>
        <div id="popoutMenuSep" class="nav-menu-sep"></div>
        <button id="popoutBtn" class="nav-menu-item" type="button" role="menuitem"><span class="nav-menu-icon">🪟</span>Pop Out</button>
      </div>

      <!-- ADD TO HOME SCREEN PROMPT (mobile only, non-standalone) -->
      <div id="a2hsPrompt" class="a2hs-prompt" hidden>
        <div class="a2hs-inner">
          <img src="PV_AppIcon.png" alt="PVHS Tools" class="a2hs-icon">
          <div class="a2hs-text">
            <p class="a2hs-title">Install as App</p>
            <p class="a2hs-desc" id="a2hsDesc">Tap <span class="a2hs-share">⬆ Share</span> then <strong style="color:#fff">"Add to Home Screen"</strong> for the full experience.</p>
          </div>
          <button id="a2hsDismiss" class="a2hs-dismiss" type="button" aria-label="Dismiss">✕</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const isPopout = mode === 'popout';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

    const navLinks = document.querySelectorAll(".nav-link");

    function updateStandaloneViewportVars() {
      if (!isStandalone) return;
      const heightCandidates = [
        window.innerHeight,
        window.outerHeight,
        window.visualViewport ? Math.round(window.visualViewport.height) : 0,
        window.screen ? window.screen.height : 0,
        window.screen ? window.screen.availHeight : 0
      ].filter(Boolean);
      const widthCandidates = [
        window.innerWidth,
        window.outerWidth,
        window.visualViewport ? Math.round(window.visualViewport.width) : 0,
        window.screen ? window.screen.width : 0,
        window.screen ? window.screen.availWidth : 0
      ].filter(Boolean);

      const appHeight = Math.max(...heightCandidates);
      const appWidth = Math.max(...widthCandidates);

      document.documentElement.style.setProperty('--standalone-app-height', `${appHeight}px`);
      document.documentElement.style.setProperty('--standalone-app-width', `${appWidth}px`);
    }

    if (isStandalone) {
      document.body.classList.add('is-standalone');
      updateStandaloneViewportVars();
      window.addEventListener('resize', updateStandaloneViewportVars);
      window.addEventListener('orientationchange', updateStandaloneViewportVars);
      window.addEventListener('pageshow', updateStandaloneViewportVars);
      window.visualViewport?.addEventListener('resize', updateStandaloneViewportVars);
      setTimeout(updateStandaloneViewportVars, 250);
      setTimeout(updateStandaloneViewportVars, 800);
    }

    if (isPopout) {
      document.body.classList.add('is-popout');
      // hide pop-out item when already in popout window
      document.getElementById('popoutBtn')?.remove();
      document.getElementById('popoutMenuSep')?.remove();
      navLinks.forEach(link => {
        const url = new URL(link.href, window.location.origin);
        url.searchParams.set('mode', 'popout');
        link.href = url.toString();
      });
    } else if (isStandalone || isMobile) {
      // hide pop-out on mobile/standalone (no windowing)
      document.getElementById('popoutBtn')?.remove();
      document.getElementById('popoutMenuSep')?.remove();
    }

    // NAV MENU
    const navMenuBtn = document.getElementById('navMenuBtn');
    const navMenu    = document.getElementById('navMenu');
    function positionNavMenu() {
      if (!navMenuBtn || !navMenu) return;
      const r = navMenuBtn.getBoundingClientRect();
      navMenu.style.top   = `${r.bottom + 6}px`;
      navMenu.style.right = `${window.innerWidth - r.right}px`;
    }
    navMenuBtn?.addEventListener('click', e => {
      e.stopPropagation();
      positionNavMenu();
      const open = navMenu.classList.toggle('is-open');
      navMenuBtn.classList.toggle('is-open', open);
      navMenuBtn.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', () => {
      navMenu?.classList.remove('is-open');
      navMenuBtn?.classList.remove('is-open');
    });
    navMenu?.addEventListener('click', e => e.stopPropagation());

    // Keep internal navigation inside the installed app.
    if (isStandalone) {
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const nextHref = link.getAttribute('href');
          if (nextHref) window.location.assign(nextHref);
        });
      });
    }

    const hours = new Date().getHours();
    let greet = "Good Morning";
    if (hours >= 21 || hours < 5) {
      greet = "Good Night";
    } else if (hours < 12) {
      greet = "Good Morning";
    } else if (hours < 17) {
      greet = "Good Afternoon";
    } else {
      greet = "Good Evening";
    }
    document.getElementById('greetingText').textContent = greet;

    document.getElementById("popoutBtn")?.addEventListener("click", () => {
      navMenu?.classList.remove('is-open');
      navMenuBtn?.classList.remove('is-open');
      window.open('index.html?mode=popout', 'pvTools', 'width=450,height=900,resizable=yes,scrollbars=no');
    });

    // ── ADD TO HOME SCREEN PROMPT ──────────────────────────────
    const a2hsPrompt   = document.getElementById('a2hsPrompt');
    const a2hsDismiss  = document.getElementById('a2hsDismiss');
    const a2hsDesc     = document.getElementById('a2hsDesc');
    const isIOS        = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid    = /Android/i.test(navigator.userAgent);
    const a2hsSeen     = localStorage.getItem('pvhs_a2hs_seen');

    if (isMobile && !isStandalone && !isPopout && !a2hsSeen && a2hsPrompt) {
      // Tailor message per platform
      if (isAndroid && a2hsDesc) {
        a2hsDesc.innerHTML = 'Tap <strong style="color:#fff">⋮ Menu</strong> in your browser then <strong style="color:#fff">"Add to Home Screen"</strong> for the full app experience.';
      }
      a2hsPrompt.hidden = false;
      setTimeout(() => a2hsPrompt.classList.add('is-visible'), 1800);
      a2hsDismiss?.addEventListener('click', () => {
        a2hsPrompt.classList.remove('is-visible');
        localStorage.setItem('pvhs_a2hs_seen', '1');
        setTimeout(() => { a2hsPrompt.hidden = true; }, 500);
      });
    }
  </script>
</body>
</html>
