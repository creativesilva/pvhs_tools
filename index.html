<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PVHS Tools">
  <meta name="theme-color" content="#007474">
  <link rel="apple-touch-icon" href="PV_Logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="PV_Logo.png">
  <title>PVHS Tools</title>

  <style>
    :root {
      --teal: #007474;
      --white: #f7fbfb;
      --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.30);
      --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12);
      --app-spacing: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #021414; }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--white); touch-action: pan-y; }

    .frame {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
    }

    .app {
      width: min(100%, 430px);
      height: 100%;
      aspect-ratio: 430 / 880;
      max-height: calc(100dvh - 24px);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background: radial-gradient(circle at center, rgba(10,34,34,0.94) 0%, rgba(4,20,20,0.98) 46%, rgba(0,116,116,1) 100%);
      display: flex; flex-direction: column;
      padding: 20px var(--app-spacing) var(--app-spacing) var(--app-spacing);
      isolation: isolate;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 36%),
                  radial-gradient(circle at top, rgba(0,116,116,0.24) 0%, transparent 42%);
      z-index: 0;
    }

    .ghost-logo {
      position: absolute; top: 56%; left: 50%; width: 182%; opacity: 0.07;
      transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%);
      pointer-events: none; z-index: 0;
    }

    .content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    
    .top-actions { width: 100%; display: flex; justify-content: flex-end; min-height: 34px; }
    
    /* Pop Out Pill - Matches Home Button Style */
    .popout-pill {
      appearance: none;
      background: rgba(255, 255, 255, 0.08); 
      border: 1px solid var(--panel-border);
      border-radius: 12px; 
      padding: 10px 12px; 
      color: #fff; 
      font-size: 10px;
      font-weight: 900; 
      text-transform: uppercase; 
      cursor: pointer; 
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      text-decoration: none;
      box-shadow: var(--soft-shadow);
    }

    .header { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .logo-clear { width: 80px; height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); }
    .title { margin: 0; font-size: clamp(34px, 10vw, 48px); line-height: 1; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
    .greeting { margin: 0; font-size: 14px; font-weight: 800; color: #00d1d1; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Subtitle centered */
    .subtitle { margin: 0; max-width: 280px; font-size: 13px; line-height: 1.4; font-weight: 700; color: var(--muted); text-wrap: balance; text-align: center; }

    .launcher-stack { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .launch-card {
      width: 100%; border-radius: 24px; background: var(--panel); border: 1px solid var(--panel-border);
      box-shadow: var(--soft-shadow); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      text-decoration: none; color: var(--white); padding: 20px 18px;
      display: flex; align-items: center; justify-content: center; /* Center buttons */
      transition: background 0.2s, transform 0.1s;
    }

    .launch-card:active { transform: scale(0.98); background: var(--card-hover); }

    /* Centered label inside buttons */
    .launch-label { margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }

    .quick-links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

    .quick-link-btn {
      display: flex; align-items: center; justify-content: center; min-height: 54px;
      padding: 10px; border-radius: 18px; text-decoration: none; color: #fff;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px); text-align: center; transition: background 0.2s;
    }

    .quick-link-btn:active { transform: scale(0.97); background: var(--card-hover); }

    .quick-link-label { margin: 0; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.2; }

    .footer-note { margin-top: auto; padding-top: 8px; font-size: 10px; color: #b5d4d4; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; text-align: center; }

    @media (max-width: 430px) {
      .frame { align-items: flex-start; }
      .app { width: 100%; aspect-ratio: auto; min-height: calc(100dvh - 24px); border-radius: 28px; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="app">
      <img src="PV_Logo.png" alt="" class="ghost-logo">

      <div class="content">
        <div class="top-actions">
          <button id="popoutBtn" class="popout-pill" type="button">Pop Out</button>
        </div>

        <div class="header">
          <img src="PV_Logo.png" alt="Logo" class="logo-clear">
          <p class="greeting" id="greetingText">Welcome</p>
          <h1 class="title">PVHS Tools</h1>
          <p class="subtitle">Quick access to campus countdowns and staff directory.</p>
        </div>

        <div class="launcher-stack">
          <a class="launch-card" href="countdown.html">
            <h2 class="launch-label">Classroom Countdown</h2>
          </a>

          <a class="launch-card" href="extension_search.html">
            <h2 class="launch-label">Search Directory</h2>
          </a>
        </div>

        <div class="quick-links-grid">
          <a class="quick-link-btn" href="https://maintenance.facilitron.com/anonymous/SantaMariaJUHSD/newworkorder" target="_blank">
            <p class="quick-link-label">Maintenance</p>
          </a>
          <a class="quick-link-btn" href="https://smjuhsd.incidentiq.com/" target="_blank">
            <p class="quick-link-label">IT Support</p>
          </a>
          <a class="quick-link-btn" href="https://login.frontlineeducation.com/login" target="_blank">
            <p class="quick-link-label">Absences</p>
          </a>
          <a class="quick-link-btn" href="https://smjuhsd-my.sharepoint.com/:x:/g/personal/etorres_smjuhsd_org/IQBiSObgdkR3R68_dXHYrDwfAbA5RpN-scClTiKQddgcsLU" target="_blank">
            <p class="quick-link-label">In Lieu</p>
          </a>
        </div>

        <div class="footer-note">CREATED BY: MR. SILVA</div>
      </div>
    </div>
  </div>

  <script>
    const hours = new Date().getHours();
    const greet = hours < 12 ? "Good Morning" : hours < 18 ? "Good Afternoon" : "Good Evening";
    document.getElementById('greetingText').textContent = greet;

    const popoutBtn = document.getElementById("popoutBtn");
    if (window.location.search.includes('popout=true')) popoutBtn.style.display = 'none';

    popoutBtn.addEventListener("click", () => {
      const width = 460; const height = 980;
      const left = (window.screen.width - width) / 2;
      const top = (window.screen.height - height) / 2;
      window.open(window.location.href + '?popout=true', 'pvTools', `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=no`);
    });
  </script>
</body>
</html>
