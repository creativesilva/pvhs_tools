<html lang="en">

  <style>
    :root {
      --teal: #007474; --white: #f7fbfb; --muted: #cfe3e3;
      --panel: rgba(255,255,255,0.02); --panel-border: rgba(255,255,255,0.05);
      --shadow: 0 20px 46px rgba(0,0,0,0.30); --soft-shadow: 0 12px 24px rgba(0,0,0,0.22);
      --card-hover: rgba(255,255,255,0.12); --app-spacing: 16px; --radius: 34px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    html, body { width: 100%; height: 100%; min-height: 100%; background: #021414; overflow: hidden; }
    body { min-height: 100vh; min-height: 100dvh; min-height: -webkit-fill-available; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; color: var(--white); touch-action: none; user-select: none; -webkit-user-select: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    .frame { width: 100%; height: 100dvh; min-height: 100vh; min-height: -webkit-fill-available; display: flex; align-items: center; justify-content: center; padding: 10px; }

    .app {
      width: 430px; height: 880px; max-width: 100%; max-height: 100%;
      border-radius: var(--radius); overflow: hidden; position: relative;
      box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12); border-top-color: rgba(255,255,255,0.04);
      background: linear-gradient(168deg, rgba(6,28,28,0.97) 0%, rgba(4,24,24,0.95) 30%, rgba(0,72,72,0.92) 60%, rgba(0,100,100,0.96) 82%, rgba(4,30,30,0.97) 100%);
      display: flex; flex-direction: column; padding: 14px var(--app-spacing) var(--app-spacing) var(--app-spacing); isolation: isolate;
    }

    .app::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 20%, rgba(0,116,116,0.18) 0%, transparent 60%),
                  radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 50%);
      z-index: 0;
    }

    .ghost-logo { position: absolute; top: 56%; left: 50%; width: 120%; opacity: 0.07; transform: translate(-50%, -50%); filter: grayscale(100%) contrast(108%) brightness(114%); pointer-events: none; z-index: 0; }

    .content { position: relative; z-index: 1; width: 100%; flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: stretch; overflow: hidden; }

    /* ── TOP ROW ── */
    .top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; height: 44px; flex-shrink: 0; margin-bottom: 4px; position: relative; }
    .logo-clear { width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.24)); flex-shrink: 0; }
    .page-title { position: absolute; left: 0; right: 0; text-align: center; font-size: 15px; font-weight: 700; color: #dff7f7; text-transform: uppercase; margin: 0; letter-spacing: 0.14em; pointer-events: none; }

    /* ── NAV DROPDOWN ── */
    .nav-menu-btn { appearance: none; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.13); border-radius: 12px; color: rgba(255,255,255,0.92); width: 34px; height: 34px; font-size: 14px; font-weight: 900; letter-spacing: 0.08em; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.16s, border-color 0.16s; }
    .nav-menu-btn.is-open, .nav-menu-btn:active { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.26); }
    .nav-menu { position: fixed; z-index: 9999; min-width: 172px; background: rgba(3,20,20,0.58); border: 1px solid rgba(255,255,255,0.16); border-radius: 16px; padding: 5px; box-shadow: 0 14px 44px rgba(0,0,0,0.52); backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px); transform-origin: top right; transform: scale(0.88) translateY(-8px); opacity: 0; pointer-events: none; transition: opacity 0.17s ease, transform 0.19s cubic-bezier(0.34,1.4,0.64,1); }
    .nav-menu.is-open { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .nav-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 11px; text-decoration: none; color: #eaf8f8; background: transparent; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; border: none; cursor: pointer; width: 100%; transition: background 0.13s; }
    .nav-menu-item:active { background: rgba(255,255,255,0.1); }
    .nav-menu-icon { font-size: 14px; flex-shrink: 0; }
    .nav-menu-sep { height: 1px; background: rgba(255,255,255,0.09); margin: 3px 6px; }

    /* ── SEARCH BAR ── */
    .map-search-row {
      display: flex; gap: 6px; width: 100%; flex-shrink: 0; margin-bottom: 6px;
      position: relative; z-index: 5;
    }
    .map-search-input {
      flex: 1; appearance: none; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      color: #f7fbfb; font-size: 13px; padding: 9px 12px;
      outline: none; font-family: inherit;
    }
    .map-search-input:focus { border-color: rgba(0,220,220,0.4); background: rgba(255,255,255,0.12); }
    .map-search-input::placeholder { color: rgba(255,255,255,0.38); }
    .map-icon-btn {
      appearance: none; width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: #dff7f7; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .map-icon-btn:active { background: rgba(255,255,255,0.14); }

    /* ── SEARCH RESULTS DROPDOWN ── */
    .map-search-results {
      position: absolute; top: 42px; left: 0; right: 42px; z-index: 12;
      background: rgba(6,26,26,0.98); border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px; padding: 4px;
      max-height: 220px; overflow-y: auto;
      box-shadow: 0 16px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .map-search-results[hidden] { display: none; }
    .map-search-item {
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      color: #f7fbfb; font-size: 12.5px;
    }
    .map-search-item:hover, .map-search-item.is-active { background: rgba(0,160,160,0.2); }
    .map-search-item-num { font-weight: 800; color: #4be1e1; min-width: 40px; }
    .map-search-item-sub { color: var(--muted); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
    .map-search-empty { padding: 10px; color: var(--muted); font-size: 11px; text-align: center; }

    /* ── MAP CANVAS ── */
    .map-wrap {
      flex: 1; min-height: 0; position: relative;
      background: radial-gradient(ellipse at center, rgba(8,40,40,0.7) 0%, rgba(3,20,20,0.85) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; overflow: hidden;
      touch-action: none;
    }
    #mapSvg { width: 100%; height: 100%; display: block; cursor: grab; }
    #mapSvg.is-grabbing { cursor: grabbing; }

    /* SVG element styles */
    .m-field { fill: rgba(100,180,110,0.16); stroke: rgba(100,180,110,0.35); stroke-width: 1.2; }
    .m-parking { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.18); stroke-width: 1; stroke-dasharray: 4 3; }
    .m-building { fill: rgba(0,140,140,0.28); stroke: rgba(75,225,225,0.5); stroke-width: 1.2; cursor: pointer; transition: fill 0.18s; }
    .m-building:hover, .m-building.is-active { fill: rgba(0,180,180,0.48); }
    .m-block-shell { fill: rgba(0,80,80,0.35); stroke: rgba(75,225,225,0.65); stroke-width: 2; cursor: pointer; transition: fill 0.18s; }
    .m-block-shell:hover, .m-block-shell.is-active { fill: rgba(0,140,140,0.45); }
    .m-hallway { fill: rgba(255,255,255,0.06); stroke: none; pointer-events: none; }
    .m-door {
      fill: rgba(255,200,80,0.85);
      stroke: rgba(255,220,120,0.95);
      stroke-width: 0.4;
      pointer-events: none;
    }
    .m-room { fill: rgba(0,180,180,0.20); stroke: rgba(120,240,240,0.5); stroke-width: 0.6; cursor: pointer; transition: fill 0.15s; }
    .m-room:hover, .m-room.is-active { fill: rgba(0,220,220,0.55); }
    .m-room.is-highlight {
      fill: rgba(255,200,40,0.65) !important;
      stroke: #ffd84b; stroke-width: 1.2;
      animation: roomPulse 1s ease-in-out infinite alternate;
    }
    @keyframes roomPulse {
      from { fill: rgba(255,200,40,0.65); stroke-width: 1.2; }
      to   { fill: rgba(255,230,80,0.95); stroke-width: 2; }
    }
    .m-gate { fill: rgba(255,180,40,0.75); stroke: rgba(255,220,80,0.95); stroke-width: 1.2; }
    .m-gate-num { fill: #021414; font-size: 14px; font-weight: 800; text-anchor: middle; dominant-baseline: central; pointer-events: none; }

    /* SVG labels — sized for viewBox 1400x940 */
    .m-label-bldg { fill: #ffffff; font-size: 20px; font-weight: 800; text-anchor: middle; dominant-baseline: central; text-transform: uppercase; letter-spacing: 0.06em; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .m-label-block { fill: #ffffff; font-size: 24px; font-weight: 900; text-anchor: middle; dominant-baseline: central; text-transform: uppercase; letter-spacing: 0.08em; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .m-label-small { fill: rgba(255,255,255,0.72); font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .m-label-field { fill: rgba(200,240,200,0.95); font-size: 20px; font-weight: 800; text-anchor: middle; dominant-baseline: central; text-transform: uppercase; letter-spacing: 0.08em; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .m-room-num { fill: #f7fbfb; font-size: 9px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .m-room-num.is-visible { opacity: 1; }
    .m-street { fill: rgba(255,255,255,0.5); font-size: 16px; font-weight: 700; text-anchor: middle; letter-spacing: 0.15em; }

    /* Compass */
    .m-compass { pointer-events: none; }

    /* ── ZOOM CONTROLS ── */
    .map-controls {
      position: absolute; right: 10px; bottom: 10px; z-index: 6;
      display: flex; flex-direction: column; gap: 6px;
    }
    .map-control-btn {
      appearance: none; width: 36px; height: 36px;
      background: rgba(6,26,26,0.82); border: 1px solid rgba(255,255,255,0.18);
      color: #dff7f7; border-radius: 10px; font-size: 17px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.35);
    }
    .map-control-btn:active { background: rgba(0,160,160,0.35); }

    /* ── BOTTOM INFO SHEET ── */
    .map-info-backdrop {
      position: absolute; inset: 0; z-index: 30;
      background: rgba(1,12,12,0.55);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .map-info-backdrop[hidden] { display: none; }
    .map-info-sheet {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 31;
      background: rgba(6,26,26,0.98);
      border-top: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px 22px 0 0;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 10px;
      transform: translateY(110%);
      transition: transform 0.42s cubic-bezier(0.34,1.25,0.64,1);
    }
    .map-info-sheet.is-visible { transform: translateY(0); }
    .map-info-sheet[hidden] { display: none; }
    .map-info-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .map-info-pill {
      font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.11em;
      background: rgba(0,116,116,0.3); color: #4bd4d4;
      border: 1px solid rgba(0,116,116,0.45); border-radius: 99px; padding: 3px 9px;
    }
    .map-info-close {
      appearance: none; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); border-radius: 99px; width: 28px; height: 28px;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .map-info-title { font-size: 18px; font-weight: 800; color: #fff; margin: 0; }
    .map-info-sub { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.45; }
    .map-info-rooms {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
      max-height: 180px; overflow-y: auto; padding: 4px 0;
    }
    .map-info-room-chip {
      appearance: none; border: 1px solid rgba(0,220,220,0.35);
      background: rgba(0,160,160,0.18); color: #4be1e1;
      border-radius: 99px; padding: 5px 10px;
      font-size: 11px; font-weight: 800; cursor: pointer;
    }
    .map-info-room-chip:active { background: rgba(0,180,180,0.35); }

    .footer-note { text-align: center; font-size: 9px; color: #b5d4d4; font-weight: 600; padding: 4px 0 0; margin-top: 4px; flex-shrink: 0; opacity: 0.75; }

    /* ── STANDALONE ── */
    body.is-standalone { background: #021414; }
    body.is-standalone::before { content: ""; position: fixed; inset: 0; background: #021414; pointer-events: none; z-index: 0; }
    body.is-standalone .frame { position: fixed; inset: 0; width: 100%; height: 100%; min-height: -webkit-fill-available; padding: 0 8px max(24px,calc(env(safe-area-inset-bottom) + 8px)) 8px; z-index: 1; }
    body.is-standalone .app { position: relative; width: 100%; height: 100%; max-width: 100%; max-height: 100%; border-radius: 34px; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 24px 46px rgba(0,0,0,0.22); padding-top: max(10px,env(safe-area-inset-top)); padding-right: max(var(--app-spacing),env(safe-area-inset-right)); padding-bottom: 18px; padding-left: max(var(--app-spacing),env(safe-area-inset-left)); }

    @media (max-width: 430px) {
      body:not(.is-standalone) .frame { padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px; }
      body:not(.is-standalone) .app { width: 100%; height: 100%; max-height: 100%; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.12); }
      body { touch-action: pan-y; }
    }
    /* ── MOBILE SWIPE HINTS ─────────────────────────────── */
    .swipe-hint { display: none; }
    @media (hover: none) and (pointer: coarse) {
      .swipe-hint {
        display: flex; justify-content: space-between;
        position: fixed; left: 0; right: 0;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        padding: 0 10px; pointer-events: none; z-index: 20;
      }
      .swipe-hint-chip {
        font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase; color: rgba(255,255,255,0.5);
        background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 999px; padding: 4px 10px;
      }
      .swipe-hint-chip[hidden] { display: none; }
    }
  </style>
</head>
<body>

  <!-- Nav Dropdown -->

      <span class="map-info-pill" id="mapInfoType">Building</span>
      <button id="mapInfoClose" class="map-info-close" type="button" aria-label="Close">&#x2715;</button>
    </div>
    <p class="map-info-title" id="mapInfoTitle">—</p>

  <script>
    // ── STANDALONE DETECTION ──
    if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
      document.body.classList.add('is-standalone');
    }

    // ── CAMPUS DATA ────────────────────────────────────────
    // Rough positions in viewBox 1400x940. Positions approximate PDF layout.
    // Classroom blocks get room-level detail. Other structures get shaped outlines + labels.

    // Helper to build a column of rooms with even spacing
    // dir: 'down' = first room at top, 'up' = first room at bottom
    function colRooms(start, count, x, y, w, h, dir) {
      const rooms = [];
      const cellH = h / count;
      for (let i = 0; i < count; i++) {
        const n = start + i;
        const yPos = y + (dir === 'up' ? (count - 1 - i) * cellH : i * cellH);
        rooms.push({ n: String(n), x: x + 1, y: yPos + 1, w: w - 2, h: cellH - 2 });
      }
      return rooms;
    }
    // Build grid rooms by columns array. Each col: {nums:[...], x, y, w, h}
    function customLayout(cols) {
      const rooms = [];
      cols.forEach(col => {
        const cellH = col.h / col.nums.length;
        col.nums.forEach((n, i) => {
          rooms.push({
            n: String(n), x: col.x + 1, y: col.y + i * cellH + 1,
            w: col.w - 2, h: cellH - 2
          });
        });
      });
      return rooms;
    }

    const rng = (s,e) => { const a=[]; for (let i=s;i<=e;i++) a.push(i); return a; };

    // CLASSROOM BLOCKS — strict grid coordinates, documented bounds:
    //   800s:    x 460-610   y 200-440    (150 wide)
    //   600s:    x 640-1170  y 200-480    (530 wide, tallest-north)
    //   Bldg H2F:x 1200-1430 y 150-260    (230 wide, floating above 400s)
    //   400s:    x 1200-1470 y 480-750    (270 wide, east-central)
    //   300s:    x 1500-1700 y 560-870    (200 wide)
    //   200s:    x 1720-1820 y 470-820    (100 wide, narrow tall)
    //   500s:    x 700-960   y 510-800    (260 wide, south-central)
    //   500s-S:  x 700-870   y 830-1020   (south wing 551-557)
    //   100s:    x 1000-1170 y 810-940    (170 wide)
    //   700s:    x 1200-1410 y 820-950    (210 wide)
    //
    // All gaps ≥ 30 viewBox units between buildings.
    const BLOCKS = [
      // 800s block — x 460-610, y 200-440
      {
        id:'800', label:'800s', desc:'Bldg R/P · small classrooms east of pool',

    const MIN_W = 200, MAX_W = 3200;

    function computeBaseVB() {
      // With preserveAspectRatio="xMidYMid slice", the SVG auto-fills the container.
      // BASE_VB is simply the full campus — user can pan/zoom from here.
      BASE_VB = {x: CAMPUS.x, y: CAMPUS.y, w: CAMPUS.w, h: CAMPUS.h};
    }

    function applyVB() {
      svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
      // Show room numbers only when zoomed in (campus width 2000 → threshold 1300)
      const visible = vb.w < 1300;
      gRoomNums.querySelectorAll('.m-room-num').forEach(t => t.classList.toggle('is-visible', visible));
    }

    // Initial fit (after layout settles)
    requestAnimationFrame(() => {
      computeBaseVB();
      vb = {...BASE_VB};
      applyVB();
    });

    // Re-fit on resize
    window.addEventListener('resize', () => {
      computeBaseVB();
    });

    function clamp() {
      vb.w = Math.max(MIN_W, Math.min(MAX_W, vb.w));
      vb.h = vb.w * (BASE_VB.h / BASE_VB.w);
      // Allow panning a bit past campus edges for comfort
      const padding = 150;
      vb.x = Math.max(CAMPUS.x - padding, Math.min(CAMPUS.x + CAMPUS.w + padding - vb.w, vb.x));
      vb.y = Math.max(CAMPUS.y - padding, Math.min(CAMPUS.y + CAMPUS.h + padding - vb.h, vb.y));
    }

    // Convert client (screen) coords → SVG coords using current CTM.
    // Correct for any preserveAspectRatio (meet/slice).
    function clientToSvg(cx, cy) {
      const pt = svg.createSVGPoint();
      pt.x = cx; pt.y = cy;
      const ctm = svg.getScreenCTM();
      if (!ctm) return null;
      return pt.matrixTransform(ctm.inverse());
    }

    // In meet mode: scale = min(rect.w/vb.w, rect.h/vb.h), letterbox on the non-filling dim.
    function getMeetScale(vbW, vbH, rect) {
      return Math.min(rect.width / vbW, rect.height / vbH);
    }

    // Compute vb.x/y so the given SVG anchor appears at the given client coord.
    // Correct for meet mode (including letterbox offsets).
    function vbForAnchor(anchorSvgX, anchorSvgY, targetClientX, targetClientY, newW, newH, rect) {
      const scale = getMeetScale(newW, newH, rect);
      const letterboxX = (rect.width  - newW * scale) / 2;
      const letterboxY = (rect.height - newH * scale) / 2;
      return {
        x: anchorSvgX - (targetClientX - rect.left - letterboxX) / scale,
        y: anchorSvgY - (targetClientY - rect.top  - letterboxY) / scale
      };
    }

    function zoomAt(clientX, clientY, factor) {
      const rect = svg.getBoundingClientRect();
      const anchor = clientToSvg(clientX, clientY);
      if (!anchor) return;
      let newW = vb.w / factor;
      newW = Math.max(MIN_W, Math.min(MAX_W, newW));
      const newH = newW * (BASE_VB.h / BASE_VB.w);
      const pos = vbForAnchor(anchor.x, anchor.y, clientX, clientY, newW, newH, rect);
      vb.w = newW; vb.h = newH;
      vb.x = pos.x; vb.y = pos.y;
      clamp();
      applyVB();
    }

    function zoomCenter(factor) {
      const rect = svg.getBoundingClientRect();
      zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, factor);
    }

    function resetView() {
      vb = {...BASE_VB};
      applyVB();
    }

    // Desktop: wheel zoom
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.15 : 1/1.15);
    }, {passive:false});

    // Mouse drag — anchor-based so movement follows cursor exactly regardless of aspect
    let mouseState = null;
    svg.addEventListener('mousedown', e => {
      svg.classList.add('is-grabbing');
      const anchor = clientToSvg(e.clientX, e.clientY);
      if (!anchor) return;
      mouseState = {anchor, startVb: {...vb}};
    });
    window.addEventListener('mousemove', e => {
      if (!mouseState) return;
      const rect = svg.getBoundingClientRect();
      const pos = vbForAnchor(mouseState.anchor.x, mouseState.anchor.y,
                              e.clientX, e.clientY,
                              mouseState.startVb.w, mouseState.startVb.h, rect);
      vb.w = mouseState.startVb.w; vb.h = mouseState.startVb.h;
      vb.x = pos.x; vb.y = pos.y;
      clamp(); applyVB();
    });
    window.addEventListener('mouseup', () => { mouseState = null; svg.classList.remove('is-grabbing'); });

    // Touch events — anchor-based pan and pinch using SVG matrix math (slice-aware)
    let touchState = null;
    function _mid(a, b) { return {x: (a.clientX + b.clientX)/2, y: (a.clientY + b.clientY)/2}; }
    function _dist(a, b) { const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY; return Math.sqrt(dx*dx + dy*dy); }

    function captureTouch(touches) {
      if (touches.length === 0) { touchState = null; return; }
      const startVb = {...vb};
      if (touches.length === 1) {
        const t = touches[0];
        const anchor = clientToSvg(t.clientX, t.clientY);
        if (!anchor) return;
        touchState = {mode:'pan', startVb, anchor};
      } else {
        const mid = _mid(touches[0], touches[1]);
        const anchor = clientToSvg(mid.x, mid.y);
        if (!anchor) return;
        touchState = {mode:'pinch', startVb, anchor, startDist: _dist(touches[0], touches[1])};
      }
    }

    svg.addEventListener('touchstart', e => { captureTouch(e.touches); }, {passive: true});

    svg.addEventListener('touchmove', e => {
      if (!touchState) return;
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      if (rect.width === 0) return;

      if (touchState.mode === 'pan' && e.touches.length === 1) {
        const t = e.touches[0];
        const pos = vbForAnchor(touchState.anchor.x, touchState.anchor.y,
                                t.clientX, t.clientY,
                                touchState.startVb.w, touchState.startVb.h, rect);
        vb.w = touchState.startVb.w; vb.h = touchState.startVb.h;
        vb.x = pos.x; vb.y = pos.y;
        clamp(); applyVB();
      } else if (touchState.mode === 'pinch' && e.touches.length >= 2) {
        const curMid = _mid(e.touches[0], e.touches[1]);
        const curDist = _dist(e.touches[0], e.touches[1]);
        if (curDist < 1) return;
        const factor = curDist / touchState.startDist;
        let newW = touchState.startVb.w / factor;
        newW = Math.max(MIN_W, Math.min(MAX_W, newW));
        const newH = newW * (BASE_VB.h / BASE_VB.w);
        const pos = vbForAnchor(touchState.anchor.x, touchState.anchor.y,
                                curMid.x, curMid.y, newW, newH, rect);
        vb.w = newW; vb.h = newH;
        vb.x = pos.x; vb.y = pos.y;
        clamp(); applyVB();
      }
    }, {passive: false});

    svg.addEventListener('touchend', e => {
      if (e.touches.length === 0) touchState = null;
      else captureTouch(e.touches);
    }, {passive: true});
    svg.addEventListener('touchcancel', () => { touchState = null; }, {passive: true});

    // Double-tap zoom
    let lastTap = 0;
    svg.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 280 && e.changedTouches.length === 1 && e.touches.length === 0) {
        const t = e.changedTouches[0];
        zoomAt(t.clientX, t.clientY, vb.w > 800 ? 2.5 : 0.5);
      }
      lastTap = now;
    });

    // Zoom buttons
    document.getElementById('mapZoomIn').addEventListener('click', () => zoomCenter(1.4));
    document.getElementById('mapZoomOut').addEventListener('click', () => zoomCenter(1/1.4));
    document.getElementById('mapReset').addEventListener('click', resetView);

    // ── SEARCH ────────────────────────────────────────────
    const searchInput = document.getElementById('mapSearchInput');
    const searchResults = document.getElementById('mapSearchResults');
    const searchClear = document.getElementById('mapSearchClear');

    function renderResults(list, query) {
      if (!list.length) {
        searchResults.innerHTML = '<div class="map-search-empty">No rooms match "' + query + '"</div>';
        searchResults.hidden = false;
        return;
      }
      searchResults.innerHTML = '';
      list.slice(0, 20).forEach(r => {
        const item = document.createElement('div');
        item.className = 'map-search-item';
        item.innerHTML = '<span class="map-search-item-num">' + r.n + '</span>' +
                         '<span class="map-search-item-sub">' + r.blockLabel + '</span>';
        item.addEventListener('click', () => {
          focusRoom(r);
          searchResults.hidden = true;
          searchInput.value = r.n;
          searchInput.blur();
        });
        searchResults.appendChild(item);
      });
      searchResults.hidden = false;
    }

    function doSearch(q) {
      q = q.trim().toLowerCase();
      if (!q) { searchResults.hidden = true; return; }
      const matches = ROOMS.filter(r => r.n.toLowerCase().startsWith(q) || r.n.toLowerCase().includes(q));
      renderResults(matches, q);
    }

    searchInput.addEventListener('input', e => doSearch(e.target.value));
    searchInput.addEventListener('focus', e => { if (e.target.value) doSearch(e.target.value); });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchResults.hidden = true;
      clearHighlight();
      resetView();
    });

    // Submit on enter
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        const exact = ROOMS.find(r => r.n === q);
        if (exact) {
          focusRoom(exact);
          searchResults.hidden = true;
          searchInput.blur();
        }
      } else if (e.key === 'Escape') {
        searchResults.hidden = true;
        searchInput.blur();
      }
    });

    // Close results when clicking outside
    document.addEventListener('click', e => {
      if (!searchResults.contains(e.target) && e.target !== searchInput) {
        searchResults.hidden = true;
      }
    });

    function clearHighlight() {
      document.querySelectorAll('.m-room.is-highlight').forEach(r => r.classList.remove('is-highlight'));
    }

    function focusRoom(room) {
      clearHighlight();
      const svgRoom = document.querySelector(`[data-room="${room.n}"]`);
      if (svgRoom && svgRoom.classList.contains('m-room')) svgRoom.classList.add('is-highlight');
      // Pan/zoom to room — zoom to ~600 viewBox width so room + neighbors fit
      const targetW = 600;
      const targetH = targetW * (BASE_VB.h / BASE_VB.w);
      vb.x = room.x - targetW/2;
      vb.y = room.y - targetH/2;
      vb.w = targetW; vb.h = targetH;
      clamp();
      applyVB();
    }

    // ── BUILDING TAP SHEET ────────────────────────────────
    const infoSheet = document.getElementById('mapInfoSheet');
    const infoBackdrop = document.getElementById('mapInfoBackdrop');
    const infoTitle = document.getElementById('mapInfoTitle');
    const infoSub = document.getElementById('mapInfoSub');
    const infoPill = document.getElementById('mapInfoType');
    const infoRooms = document.getElementById('mapInfoRooms');

    function openInfo(title, sub, pill, rooms) {
      infoTitle.textContent = title;
      infoSub.textContent = sub || '';
      infoPill.textContent = pill || 'Info';
      if (rooms && rooms.length) {
        infoRooms.innerHTML = '';
        infoRooms.hidden = false;
        rooms.forEach(n => {
          const chip = document.createElement('button');
          chip.className = 'map-info-room-chip';
          chip.type = 'button';
          chip.textContent = n;
          chip.addEventListener('click', () => {
            closeInfo();
            const r = ROOMS.find(x => x.n === n);
            if (r) focusRoom(r);
          });
          infoRooms.appendChild(chip);
        });
      } else {
        infoRooms.hidden = true;
      }
      infoBackdrop.hidden = false;
      infoSheet.hidden = false;
      requestAnimationFrame(() => requestAnimationFrame(() => infoSheet.classList.add('is-visible')));
    }
    function closeInfo() {
      infoSheet.classList.remove('is-visible');
      setTimeout(() => { infoSheet.hidden = true; infoBackdrop.hidden = true; }, 420);
    }
    infoBackdrop.addEventListener('click', closeInfo);
    document.getElementById('mapInfoClose').addEventListener('click', closeInfo);

    // Click on block/building opens info
    svg.addEventListener('click', e => {
      // Block
      const block = e.target.closest('.m-block-shell');
      if (block) {
        const bid = block.dataset.id;
        const b = BLOCKS.find(x => x.id === bid);
        if (b) openInfo(b.label, b.desc, 'Classroom Block', b.rooms.map(String));
        return;
      }
      // Room
      const room = e.target.closest('.m-room');
      if (room) {
        const rn = room.dataset.room;
        const r = ROOMS.find(x => x.n === rn);
        if (r) { focusRoom(r); return; }
      }
      // Building/field/parking
      const building = e.target.closest('.m-building, .m-field, .m-parking');
      if (building) {
        const bid = building.dataset.id;
        const s = STRUCTURES.find(x => x.id === bid);
        if (s) openInfo(s.label, '', s.type === 'field' ? 'Field' : s.type === 'parking' ? 'Parking' : 'Building');
      }
    });

    // ── NAV MENU ──────────────────────────────────────────
    const navMenuBtn = document.getElementById('navMenuBtn');
    const navMenu = document.getElementById('navMenu');
    function positionMenu() {
      const r = navMenuBtn.getBoundingClientRect();
      navMenu.style.top  = (r.bottom+6)+'px';
      navMenu.style.right= (window.innerWidth-r.right)+'px';
    }
    navMenuBtn.addEventListener('click', e => {
      e.stopPropagation();
      positionMenu();
      const open = navMenu.classList.toggle('is-open');
      navMenuBtn.classList.toggle('is-open', open);
      navMenu.setAttribute('aria-hidden', String(!open));
    });
    document.addEventListener('click', e => {
      if (!navMenu.contains(e.target) && e.target !== navMenuBtn) {
        navMenu.classList.remove('is-open');
        navMenuBtn.classList.remove('is-open');
        navMenu.setAttribute('aria-hidden', 'true');
      }
    });

    // ── LOGO HOME LINK (PWA standalone fix) ───────────────
    (function() {
      var logo = document.querySelector('.top-row a[aria-label="Home"]');
      if (logo) logo.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'index.html';
      });
    })();

    // ── SERVICE WORKER ────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
    }

    // ── DEEP LINK: #room-415 ──────────────────────────────
    (function() {
      const hash = window.location.hash;
      if (!hash.startsWith('#room-')) return;
      const rn = hash.slice(6);
      const r = ROOMS.find(x => x.n === rn);
      if (!r) return;
      // Wait for initial fit (two frames after load) before focusing
      window.addEventListener('load', () => {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          focusRoom(r);
          searchInput.value = rn;
        }));
      });
      history.replaceState(null, '', window.location.pathname);
    })();
    if ('serviceWorker' in navigator) navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());

    // ── SWIPE PAGE NAVIGATION (off-ring: any swipe → index) ───────────────
    (function() {
      const PAGES = ['index.html','calendar.html','extension_search.html','countdown.html'];
      const path = location.pathname;
      let idx = PAGES.findIndex(p => path.endsWith('/' + p));
      if (idx < 0 && (path.endsWith('/') || /\/pvhs_tools\/?$/.test(path))) idx = 0;
      const inRing = idx >= 0; // false for map.html
      // Swipe hint chips
      const _prevChip = document.getElementById('swipeHintPrev');
      const _nextChip = document.getElementById('swipeHintNext');
      if (_prevChip) _prevChip.querySelector('em').textContent = 'Home';
      if (_nextChip) _nextChip.hidden = true;
      // Entrance animation
      const _sdir = localStorage.getItem('pvSwipeDir');
      if (_sdir) {
        localStorage.removeItem('pvSwipeDir');
        const _app = document.querySelector('.app');
        if (_app) {
          _app.style.transform = _sdir === 'l' ? 'translateX(6%)' : 'translateX(-6%)';
          _app.style.opacity = '0';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            _app.style.transition = 'transform 0.32s cubic-bezier(0.2,0,0,1), opacity 0.28s ease-out';
            _app.style.transform = ''; _app.style.opacity = '';
            setTimeout(() => { _app.style.transition = ''; }, 350);
          }));
        }
      }
      function overlayOpen() {
        const nav = document.getElementById('navMenu');
        return nav && nav.classList.contains('is-open');
      }
      let x0 = 0, y0 = 0, live = false;
      document.addEventListener('touchstart', e => {
        if (overlayOpen()) { live = false; return; }
        x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; live = true;
      }, { passive: true });
      document.addEventListener('touchend', e => {
        if (!live) return; live = false;
        const dx = e.changedTouches[0].clientX - x0;
        const dy = e.changedTouches[0].clientY - y0;
        if (Math.abs(dx) < 55 || Math.abs(dx) <= Math.abs(dy)) return;
        const app = document.querySelector('.app');
        if (app) {
          app.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
          app.style.transform = dx < 0 ? 'translateX(-6%)' : 'translateX(6%)';
          app.style.opacity = '0';
        }
        localStorage.setItem('pvSwipeDir', dx < 0 ? 'l' : 'r');
        setTimeout(() => { location.href = 'index.html'; }, 190);
      }, { passive: true });
    })();
    // ─────────────────────────────────────────────────────────────────────
  </script>
  <div class="swipe-hint" aria-hidden="true">
    <span class="swipe-hint-chip" id="swipeHintPrev">&#x2039; <em></em></span>
    <span class="swipe-hint-chip" id="swipeHintNext"><em></em> &#x203a;</span>
  </div>
</body>
</html>
